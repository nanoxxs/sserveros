<script>
const TAG_LABELS = {
  warn:'告警', found:'发现', recover:'恢复', pid:'PID消失', info:'信息',
  admin_stop:'管理员停止', stop:'外部停止', crash:'异常退出', command:'指令'
};
const TAG_CLASSES = {
  warn:'tag-warn', found:'tag-found', recover:'tag-recover', pid:'tag-pid', info:'tag-info',
  admin_stop:'tag-admin-stop', stop:'tag-stop', crash:'tag-crash', command:'tag-command'
};

const { createApp } = Vue;

createApp({
  data() {
    return {
      // Auth
      isLoggedIn: false,
      loginPwd: '',
      loginError: false,
      // App
      tabs: [
        {id:'gpu', label:'概览'},
        {id:'pids', label:'PIDs'},
        {id:'settings', label:'设置'},
        {id:'log', label:'日志'},
      ],
      currentTab: 'gpu',
      hostname: '',
      monitorRunning: false,
      _refreshTimer: null,
      _appStarted: false,
      // Toast
      toast: {text:'', ok:true, visible:false},
      _toastTimer: null,
      // Dropdown
      dropdownOpen: false,
      // UI appearance
      uiTheme: 'light',
      uiSurface: 'solid',
      // Password modal
      pwdModalOpen: false,
      curPwd: '', newPwd: '', confirmPwd: '',
      pwdMsg: {text:'', kind:''},
      // GPU / sysinfo
      gpus: [],
      gpuView: 'list',
	      currentGpuIndex: null,
	      gpuDetail: null,
      gpuDetailTab: 'processes',
	      gpuDetailLoading: false,
      gpuDetailError: '',
      cpuPct: null,
      cpuCountLogical: 0,
      cpuCountPhysical: 0,
      cpuPerCore: [],
      cpuTimesPercent: {},
      cpuFreqMhz: {},
      loadAvg: [],
      topCpuProcesses: [],
      ramUsedMib: null, ramTotalMib: null,
      ramAvailableMib: null, ramFreeMib: null,
      ramCachedMib: null, ramBuffersMib: null, ramSharedMib: null,
      swapUsedMib: 0, swapTotalMib: 0, swapPct: 0,
      topMemoryProcesses: [],
      diskPct: null, diskUsedGb: null, diskTotalGb: null,
      diskData: [],
      // PID
      pidData: [],
      addPidInput: '',
      addNoteInput: '',
      pidMsg: {text:'', kind:''},
      // Settings
      cfgMemMonitor: true,
      cfgMainPidMonitor: true,
      cfgThreshold: 5120,
      cfgInterval: 120,
      cfgConfirm: 3,
      cfgLogMb: 10,
      cfgLogKeep: 5,
	      cfgGpus: '',
	      cfgDisplayHostname: '',
	      cfgReleaseCommandEnabled: true,
	      cfgReleaseCommandNotify: true,
	      cfgReleaseCommandLauncher: 'detached',
	      cfgReleaseCommandTmuxEnabled: false,
	      cfgReleaseCommandGpus: '',
      cfgReleaseCommandThreshold: 5120,
      cfgReleaseCommandInterval: 120,
      cfgReleaseCommandConfirm: 3,
      releaseGpuPresets: [],
	      releasePanelOpen: {defaults:true, presets:true},
      releaseGroupOpen: {},
	      releaseCommands: [],
	      tmuxStatus: {installed:false, path:'', version:''},
	      zellijStatus: {installed:false, path:'', version:''},
      newReleaseCommand: '',
      newReleaseCommandNote: '',
      releaseCommandMsg: {text:'', kind:''},
      releaseCommandDrafts: {},
      draggedReleaseCommandId: '',
      dragOverReleaseCommandId: '',
      dragOverReleaseCommandPosition: 'before',
      cfgServerchanKeys: '',
      barkConfigs: [],
      monitorSaveMsg: {text:'', kind:''},
      releaseSaveMsg: {text:'', kind:''},
      notifySaveMsg: {text:'', kind:''},
      envChannelMsg: {text:'', kind:''},
      // Agent config
	      settingsSections: [
	        {id:'monitor', label:'监控参数'},
	        {id:'notify', label:'通知渠道'},
	        {id:'agent', label:'Agent'},
      ],
      activeSettingsSection: 'monitor',
      cfgAgentEnabled: false,
      cfgLlmBaseUrl: '',
      cfgLlmApiKey: '',
      cfgLlmModel: '',
      cfgLlmMaxIter: 8,
      cfgLlmTimeout: 30,
      cfgLlmTemp: 0.2,
      cfgAgentStream: true,
      agentSaveMsg: {text:'', kind:''},
      // Log
      logEntries: [],
      archives: [],
      logView: 'list',
      logDetailIdx: null,
      // Agent
      agentEnabled: false,
      agentMessages: [],
      agentInput: '',
      agentBusy: false,
      agentSessionId: null,
      agentHistory: [],
      agentAbortCtrl: null,
      agentChatOpen: false,
      agentUnread: false,
      isMobileAgent: false,
      agentPaneHeight: 600,
      _resizeBound: false,
    };
  },

  computed: {
    visibleTabs() {
      const tabs = [...this.tabs];
      if (this.isMobileAgent && this.agentEnabled) tabs.push({id:'agent', label:'Agent'});
      return tabs;
    },
    agentPanelVisible() {
      if (!this.agentEnabled) return false;
      return this.isMobileAgent ? this.currentTab === 'agent' : this.agentChatOpen;
    },
    ramPct() {
      return this.ramTotalMib > 0 ? Math.round(this.ramUsedMib / this.ramTotalMib * 100) : 0;
    },
    ramDisplay() {
      return this.ramTotalMib
        ? (this.ramUsedMib / 1024).toFixed(1) + ' / ' + (this.ramTotalMib / 1024).toFixed(1) + ' GB'
        : '—';
    },
    diskDisplay() {
      return this.diskTotalGb ? this.diskUsedGb + ' / ' + this.diskTotalGb + ' GB' : '—';
    },
    cpuDetailStats() {
      const freq = this.cpuFreqMhz || {};
      const load = Array.isArray(this.loadAvg) && this.loadAvg.length
        ? this.loadAvg.map(v => Number(v).toFixed(2)).join(' / ')
        : '—';
      return [
        {label:'当前利用率', value: this.cpuPct != null ? `${this.cpuPct.toFixed(1)}%` : '—'},
        {label:'核心/线程', value: `${this.cpuCountPhysical || '—'} / ${this.cpuCountLogical || '—'}`},
        {label:'当前频率', value: freq.current ? `${freq.current.toFixed(0)} MHz` : '—'},
        {label:'Load Avg', value: load},
        {label:'User / System', value: `${(this.cpuTimesPercent.user || 0).toFixed(1)}% / ${(this.cpuTimesPercent.system || 0).toFixed(1)}%`},
        {label:'Idle', value: `${(this.cpuTimesPercent.idle || 0).toFixed(1)}%`},
      ];
    },
    memoryDetailStats() {
      return [
        {label:'已用内存', value: this.formatMib(this.ramUsedMib)},
        {label:'可用内存', value: this.formatMib(this.ramAvailableMib)},
        {label:'总内存', value: this.formatMib(this.ramTotalMib)},
        {label:'缓存', value: this.formatMib(this.ramCachedMib)},
        {label:'Buffers', value: this.formatMib(this.ramBuffersMib)},
        {label:'Swap', value: `${this.formatMib(this.swapUsedMib)} / ${this.formatMib(this.swapTotalMib)}`},
      ];
    },
    gpuDetailStats() {
      if (!this.gpuDetail) return [];
      const d = this.gpuDetail;
      const stats = [];
      if (d.mem_used != null && d.mem_total != null) {
        const p = d.mem_total > 0 ? Math.round(d.mem_used / d.mem_total * 100) : null;
        stats.push({label:'显存', value:`${d.mem_used} / ${d.mem_total} MiB${p != null ? ' (' + p + '%)' : ''}`});
      }
      if (d.util_pct != null) stats.push({label:'GPU 利用率', value:`${d.util_pct}%`});
      if (d.temp_c != null) stats.push({label:'温度', value:`${d.temp_c}°C`});
      stats.push({label:'进程数', value:`${(d.processes||[]).length}`});
      return stats;
    },
    gpuDetailProcessesSorted() {
      return [...(this.gpuDetail?.processes || [])].sort((a, b) => b.mem_mib - a.mem_mib);
    },
    logDetail() {
      return this.logDetailIdx !== null ? this.logEntries[this.logDetailIdx] : null;
    },
    releaseCommandGpuNumbers() {
      return this.parseReleaseGpuListLoose(this.cfgReleaseCommandGpus);
    },
    releaseCommandPresetMap() {
      const out = {};
      for (const preset of this.releaseGpuPresets) {
        const gpu = String(preset.gpu ?? '').trim();
        if (/^\d+$/.test(gpu)) out[gpu] = preset;
      }
      return out;
    },
	    releaseCommandGroups() {
	      const groups = new Map();
	      const ensure = (gpus) => {
        const key = this.releaseCommandGroupKey(gpus);
        if (!groups.has(key)) {
          const settings = this.releaseSettingsForGroup(gpus);
          groups.set(key, {
            key,
            label: this.releaseCommandTargetLabel(gpus),
            target_gpus: gpus,
            commands: [],
            pending: 0,
            paused: 0,
            running: 0,
            done: 0,
            settingsText: `${settings.mem_threshold_mib} MiB / ${settings.check_interval} 秒 / 首次发现后复核 ${settings.confirm_times} 次`,
          });
        }
        return groups.get(key);
      };
      for (const gpu of this.releaseCommandGpuNumbers) ensure([gpu]);
      for (const preset of this.releaseGpuPresets) {
        const gpu = Number(String(preset.gpu ?? '').trim());
        if (Number.isInteger(gpu) && gpu >= 0) ensure([gpu]);
      }
      for (const cmd of this.releaseCommands) {
        const gpus = this.releaseCommandTargetGpus(cmd.target_gpus);
        const group = ensure(gpus);
        group.commands.push(cmd);
        if (cmd.status === 'pending' && cmd.paused) group.paused += 1;
        else if (cmd.status === 'pending') group.pending += 1;
        else if (cmd.status === 'running') group.running += 1;
        else if (cmd.status === 'success' || cmd.status === 'failed') group.done += 1;
      }
      const sorted = [...groups.values()].sort((a, b) => {
        if (a.key === 'any') return -1;
        if (b.key === 'any') return 1;
        const ag = a.target_gpus[0] ?? 999999;
        const bg = b.target_gpus[0] ?? 999999;
        return ag - bg || a.key.localeCompare(b.key);
	      });
	      return sorted.filter(group => group.commands.length || group.key !== 'any');
	    },
	    currentGpuReleaseCommandGroups() {
	      if (this.currentGpuIndex === null || this.currentGpuIndex === undefined) return [];
	      const current = Number(this.currentGpuIndex);
	      const groups = new Map();
	      const ensure = (gpus) => {
	        const key = this.releaseCommandGroupKey(gpus);
	        if (!groups.has(key)) {
	          const settings = this.releaseSettingsForGroup(gpus);
	          groups.set(key, {
	            key,
	            label: this.releaseCommandTargetLabel(gpus),
	            target_gpus: gpus,
	            commands: [],
	            pending: 0,
	            paused: 0,
	            running: 0,
	            done: 0,
	            settingsText: `${settings.mem_threshold_mib} MiB / ${settings.check_interval} 秒 / 首次发现后复核 ${settings.confirm_times} 次`,
	          });
	        }
	        return groups.get(key);
	      };
	      for (const cmd of this.releaseCommands) {
	        const gpus = this.releaseCommandTargetGpus(cmd.target_gpus);
	        if (gpus.length && !gpus.includes(current)) continue;
	        const group = ensure(gpus);
	        group.commands.push(cmd);
	        if (cmd.status === 'pending' && cmd.paused) group.paused += 1;
	        else if (cmd.status === 'pending') group.pending += 1;
	        else if (cmd.status === 'running') group.running += 1;
	        else if (cmd.status === 'success' || cmd.status === 'failed') group.done += 1;
	      }
	      return [...groups.values()].sort((a, b) => {
	        if (a.key === 'any') return -1;
	        if (b.key === 'any') return 1;
	        return a.key.localeCompare(b.key);
	      });
	    },
	    currentGpuReleasePreset() {
	      if (this.currentGpuIndex === null || this.currentGpuIndex === undefined) return null;
	      const key = String(this.currentGpuIndex);
	      return this.releaseGpuPresets.find(p => String(p.gpu ?? '').trim() === key) || null;
	    },
	    deadPidCount() {
	      return this.pidData.filter(p => !p.alive).length;
	    },
  },

  methods: {
    // ── API ──────────────────────────────────────────
    async api(path, opts = {}) {
      const r = await fetch(path, opts);
      if (r.status === 401 && path !== '/api/auth/login') location.reload();
      return r;
    },

    // ── Auth ─────────────────────────────────────────
    async doLogin() {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({password: this.loginPwd}),
      });
      if (r.ok) {
        this.loginError = false;
        this.isLoggedIn = true;
        this.startApp();
      } else {
        this.loginError = true;
      }
    },

    async doLogout() {
      await fetch('/api/auth/logout', {method: 'POST'});
      location.reload();
    },

    async checkAuth() {
      try {
        const r = await fetch('/api/state');
        if (r.ok) { this.isLoggedIn = true; this.startApp(); return; }
      } catch(e) {}
    },

    // ── Bootstrap ────────────────────────────────────
    startApp() {
      if (this._appStarted) return;
      this._appStarted = true;
      this.hostname = location.hostname;
      this.startStateRefresh();
      this.loadAgentConfig();
      this.openReleaseCommandFromUrl();
    },

    async openReleaseCommandFromUrl() {
      const params = new URLSearchParams(location.search);
      const taskId = params.get('task_id');
      if (!taskId) return;
      await this.refreshReleaseCommands();
      const task = this.releaseCommands.find(cmd => cmd.id === taskId);
      if (!task) return;
      const queryGpu = Number(params.get('gpu'));
      const targetGpu = Number.isInteger(queryGpu) && queryGpu >= 0
        ? queryGpu
        : this.releaseCommandTargetGpus(task.target_gpus)[0];
      if (targetGpu === undefined) return;
      await this.showGpuDetail(targetGpu);
      this.gpuDetailTab = 'tasks';
      await this.refreshReleaseCommands();
    },

    // ── Toast ─────────────────────────────────────────
    showToast(msg, ok = true) {
      this.toast = {text: msg, ok, visible: true};
      if (this._toastTimer) clearTimeout(this._toastTimer);
      this._toastTimer = setTimeout(() => { this.toast.visible = false; }, 2800);
    },

    // ── Tab ───────────────────────────────────────────
    switchTab(name) {
      if (name === 'agent' && (!this.isMobileAgent || !this.agentEnabled)) return;
      this.currentTab = name;
      if (name === 'gpu' || name === 'pids') this.fetchState();
      if (name === 'pids') this.loadPids();
      if (name === 'settings') { this.loadSettings(); this.loadAgentConfig(); }
      if (name === 'log') { this.loadLog(); this.loadArchives(); }
      if (name === 'agent') {
        this.agentUnread = false;
        window.scrollTo({top:0, left:0, behavior:'auto'});
        this.loadAgentConfig();
        this.$nextTick(() => {
          this.updateAgentPaneHeight();
          this.scrollAgentToBottom();
          this.initAgentInputResize();
          if (this.$refs.agentInput) this.$refs.agentInput.focus();
        });
      }
    },

    initUiAppearance() {
      const theme = localStorage.getItem('sserveros.theme');
      const surface = localStorage.getItem('sserveros.surface');
      this.uiTheme = theme === 'dark' ? 'dark' : 'light';
      this.uiSurface = surface === 'glass' ? 'glass' : 'solid';
      this.applyUiAppearance();
    },

    applyUiAppearance() {
      document.documentElement.dataset.theme = this.uiTheme;
      document.documentElement.dataset.glass = this.uiSurface === 'glass' ? 'on' : 'off';
    },

    setUiTheme(theme) {
      this.uiTheme = theme === 'dark' ? 'dark' : 'light';
      localStorage.setItem('sserveros.theme', this.uiTheme);
      this.applyUiAppearance();
    },

    setUiSurface(surface) {
      this.uiSurface = surface === 'glass' ? 'glass' : 'solid';
      localStorage.setItem('sserveros.surface', this.uiSurface);
      this.applyUiAppearance();
    },

    handleViewportChange() {
      const mobile = window.matchMedia('(max-width: 640px)').matches;
      const wasMobile = this.isMobileAgent;
      this.isMobileAgent = mobile;
      if (mobile && !wasMobile) {
        this.agentChatOpen = false;
      } else if (!mobile && wasMobile && this.currentTab === 'agent') {
        this.currentTab = 'gpu';
        this.agentChatOpen = this.agentEnabled;
        this.agentUnread = false;
      }
      this.$nextTick(() => {
        this.updateAgentPaneHeight();
        if (this.agentPanelVisible) {
          this.scrollAgentToBottom();
          this.initAgentInputResize();
        }
      });
    },

    updateAgentPaneHeight() {
      if (!this.isMobileAgent || this.currentTab !== 'agent') return;
      const panel = this.$refs.agentWindow;
      if (!panel) return;
      const top = panel.getBoundingClientRect().top;
      this.agentPaneHeight = Math.max(280, window.innerHeight - top);
    },

    // ── State ─────────────────────────────────────────
    startStateRefresh() {
      if (this._refreshTimer) return;
      this.fetchState();
      this.fetchSysinfo();
      this._refreshTimer = setInterval(() => {
        this.fetchState();
        this.fetchSysinfo();
        this.fetchActiveSystemDetail();
      }, 5000);
    },

    async fetchState() {
      try {
        const r = await this.api('/api/state');
        if (!r.ok) return;
        const data = await r.json();
	        this.gpus = data.gpus || [];
	        if (data.hostname) this.hostname = data.hostname;
	        if (this.currentTab === 'pids') this.pidData = data.watch_pids || [];
	        this.syncReleaseCommands(data.release_commands || this.releaseCommands);
	        const editingTaskSettings = (
	          this.currentTab === 'gpu' && this.gpuView === 'detail' && this.gpuDetailTab === 'taskSettings'
	        );
	        if (this.currentTab !== 'settings' && !editingTaskSettings) {
	          this.cfgReleaseCommandEnabled = data.release_command_enabled !== false;
	          this.cfgReleaseCommandNotify = data.release_command_notify_enabled !== false;
	          this.cfgReleaseCommandLauncher = data.release_command_launcher || (data.release_command_tmux_enabled === true ? 'tmux' : 'detached');
	          this.cfgReleaseCommandTmuxEnabled = this.cfgReleaseCommandLauncher === 'tmux';
	          this.cfgReleaseCommandGpus = (data.release_command_gpus || []).join(',');
	          this.cfgReleaseCommandThreshold = data.release_command_mem_threshold_mib ?? this.cfgReleaseCommandThreshold;
	          this.cfgReleaseCommandInterval = data.release_command_check_interval ?? this.cfgReleaseCommandInterval;
	          this.cfgReleaseCommandConfirm = data.release_command_confirm_times ?? this.cfgReleaseCommandConfirm;
	        }
	        this.tmuxStatus = data.tmux_status || this.tmuxStatus;
	        this.zellijStatus = data.zellij_status || this.zellijStatus;
	        this.monitorRunning = !!data.monitor_running;
        this.$nextTick(() => this.updateAgentPaneHeight());
      } catch(e) {}
    },

    async fetchSysinfo() {
      try {
        const r = await this.api('/api/sysinfo');
        if (!r.ok) return;
        const d = await r.json();
        this.cpuPct = d.cpu_pct ?? null;
        this.cpuCountLogical = d.cpu_count_logical || 0;
        this.ramUsedMib = d.ram_used_mib ?? null;
        this.ramTotalMib = d.ram_total_mib ?? null;
        this.diskPct = d.disk_pct ?? null;
        this.diskUsedGb = d.disk_used_gb ?? null;
        this.diskTotalGb = d.disk_total_gb ?? null;
        this.diskData = d.disks || [];
      } catch(e) {}
    },

    async fetchCpuDetail() {
      try {
        const r = await this.api('/api/sysinfo/cpu');
        if (!r.ok) return;
        const d = await r.json();
        this.cpuPct = d.cpu_pct ?? this.cpuPct;
        this.cpuCountLogical = d.cpu_count_logical || 0;
        this.cpuCountPhysical = d.cpu_count_physical || 0;
        this.cpuPerCore = d.cpu_per_core || [];
        this.cpuTimesPercent = d.cpu_times_percent || {};
        this.cpuFreqMhz = d.cpu_freq_mhz || {};
        this.loadAvg = d.load_avg || [];
        this.topCpuProcesses = d.top_cpu_processes || [];
      } catch(e) {}
    },

    async fetchMemoryDetail() {
      try {
        const r = await this.api('/api/sysinfo/memory');
        if (!r.ok) return;
        const d = await r.json();
        this.ramUsedMib = d.ram_used_mib ?? this.ramUsedMib;
        this.ramTotalMib = d.ram_total_mib ?? this.ramTotalMib;
        this.ramAvailableMib = d.ram_available_mib ?? null;
        this.ramFreeMib = d.ram_free_mib ?? null;
        this.ramCachedMib = d.ram_cached_mib ?? null;
        this.ramBuffersMib = d.ram_buffers_mib ?? null;
        this.ramSharedMib = d.ram_shared_mib ?? null;
        this.swapUsedMib = d.swap_used_mib ?? 0;
        this.swapTotalMib = d.swap_total_mib ?? 0;
        this.swapPct = d.swap_pct ?? 0;
        this.topMemoryProcesses = d.top_memory_processes || [];
      } catch(e) {}
    },

    fetchActiveSystemDetail() {
      if (this.currentTab !== 'gpu') return;
      if (this.gpuView === 'cpu') this.fetchCpuDetail();
      if (this.gpuView === 'memory') this.fetchMemoryDetail();
    },

    // ── GPU ───────────────────────────────────────────
    gpuMemPct(gpu) {
      return gpu.mem_total > 0 ? Math.round(gpu.mem_used / gpu.mem_total * 100) : 0;
    },

	    async showGpuDetail(idx) {
	      this.currentGpuIndex = idx;
	      this.gpuView = 'detail';
	      this.gpuDetailTab = 'processes';
	      this.gpuDetail = null;
	      this.gpuDetailError = '';
	      await Promise.all([this.loadGpuDetail(idx), this.loadPids(), this.loadSettings()]);
	    },

	    async refreshGpuDetailView() {
	      if (this.currentGpuIndex === null || this.currentGpuIndex === undefined) return;
	      const extra = this.gpuDetailTab === 'taskSettings'
	        ? this.loadSettings()
	        : this.refreshReleaseCommands();
	      await Promise.all([this.loadGpuDetail(this.currentGpuIndex), extra]);
	    },

	    async switchGpuDetailTab(tab) {
	      this.gpuDetailTab = tab;
	      if (tab === 'tasks') await this.refreshReleaseCommands();
	      if (tab === 'taskSettings') await this.loadSettings();
	    },

    async loadGpuDetail(idx) {
      this.gpuDetailLoading = true;
      this.gpuDetailError = '';
      try {
        const r = await this.api(`/api/gpu/${idx}/processes`);
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          this.gpuDetailError = err.error || '获取失败';
          return;
        }
        this.gpuDetail = await r.json();
      } catch(e) {
        this.gpuDetailError = '请求出错';
      } finally {
        this.gpuDetailLoading = false;
      }
    },

    showDiskDetail() {
      if (!this.diskData.length) return;
      this.gpuView = 'disk';
    },

    async showCpuDetail() {
      this.gpuView = 'cpu';
      await this.fetchCpuDetail();
    },

    async showMemoryDetail() {
      this.gpuView = 'memory';
      await this.fetchMemoryDetail();
    },

    // ── PIDs ──────────────────────────────────────────
    async loadPids() {
      const r = await this.api('/api/state');
      if (!r.ok) return;
      const data = await r.json();
      this.pidData = data.watch_pids || [];
    },

    isPidWatched(pid) {
      return this.pidData.some(p => p.pid === pid);
    },

    async addGpuProcessPid(proc) {
      const pid = parseInt(proc?.pid, 10);
      if (!pid || pid <= 0) {
        this.showToast('PID 必须是正整数', false);
        return;
      }
      const note = `GPU ${this.currentGpuIndex}`;
      const r = await this.api('/api/pids/add', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({pid, note}),
      });
      const payload = await r.json().catch(() => ({}));
      if (r.ok) {
        this.showToast(payload.warning||payload.message||'PID 已加入监控', !payload.warning);
        await this.loadPids();
        return;
      }
      this.showToast(payload.error||'添加失败', false);
    },

    async addPid() {
      const pid = parseInt(this.addPidInput);
      if (!pid || pid <= 0) {
        this.pidMsg = {text:'PID 必须是正整数', kind:'error'};
        return;
      }
      const note = this.addNoteInput.trim();
      const r = await this.api('/api/pids/add', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({pid, note}),
      });
      const payload = await r.json().catch(() => ({}));
      if (r.ok) {
        this.addPidInput = ''; this.addNoteInput = '';
        this.pidMsg = {text: payload.warning||payload.message||'PID 已保存', kind: payload.warning?'warn':'success'};
        this.loadPids();
        return;
      }
      this.pidMsg = {text: payload.error||'添加失败', kind:'error'};
    },

    async removePid(pid) {
      const r = await this.api('/api/pids/remove', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({pid}),
      });
      const payload = await r.json().catch(() => ({}));
      this.pidMsg = {
        text: payload.warning||payload.message||(r.ok?'PID 已移除':'移除失败'),
        kind: r.ok ? (payload.warning?'warn':'success') : 'error',
      };
      this.loadPids();
    },

    async clearDeadPids() {
      const dead = this.pidData.filter(p => !p.alive);
      if (!dead.length) return;
      if (!confirm(`确认移除全部 ${dead.length} 个已消失的 PID？`)) return;
      const r = await this.api('/api/pids/clear-dead', {method:'POST'});
      const payload = await r.json().catch(() => ({}));
      if (r.ok) {
        const count = payload.removed_count ?? dead.length;
        this.pidMsg = {
          text: payload.warning||payload.message||`已移除 ${count} 个已消失的 PID`,
          kind: payload.warning?'warn':'success',
        };
        this.loadPids();
        return;
      }
      this.pidMsg = {text: payload.error||'批量移除失败', kind:'error'};
    },

    // ── Settings ──────────────────────────────────────
    scrollSettingSection(id) {
      this.activeSettingsSection = id;
	      const refMap = {
	        monitor: 'settingsMonitor',
	        notify: 'settingsNotify',
	        agent: 'settingsAgent',
      };
      const el = this.$refs[refMap[id]];
      if (el && el.scrollIntoView) el.scrollIntoView({behavior:'smooth', block:'start'});
    },

    async loadSettings() {
      const r = await this.api('/api/config');
      if (!r.ok) return;
      const cfg = await r.json();
      const env = cfg.env_channel_summary || {};
      this.cfgThreshold = cfg.mem_threshold_mib ?? 5120;
      this.cfgInterval = cfg.check_interval ?? 120;
      this.cfgConfirm = cfg.confirm_times ?? 3;
      this.cfgLogMb = cfg.log_max_size_mb ?? 10;
      this.cfgLogKeep = cfg.log_archive_keep ?? 5;
      this.cfgGpus = (cfg.gpus || []).join(',');
      this.cfgDisplayHostname = cfg.display_hostname || '';
      this.cfgMemMonitor = cfg.gpu_mem_monitor_enabled !== false;
	      this.cfgMainPidMonitor = cfg.main_pid_monitor_enabled !== false;
	      this.cfgReleaseCommandEnabled = cfg.release_command_enabled !== false;
	      this.cfgReleaseCommandNotify = cfg.release_command_notify_enabled !== false;
	      this.cfgReleaseCommandLauncher = cfg.release_command_launcher || (cfg.release_command_tmux_enabled === true ? 'tmux' : 'detached');
	      this.cfgReleaseCommandTmuxEnabled = this.cfgReleaseCommandLauncher === 'tmux';
	      this.cfgReleaseCommandGpus = (cfg.release_command_gpus || []).join(',');
      this.cfgReleaseCommandThreshold = cfg.release_command_mem_threshold_mib ?? 5120;
      this.cfgReleaseCommandInterval = cfg.release_command_check_interval ?? (cfg.check_interval ?? 120);
      this.cfgReleaseCommandConfirm = cfg.release_command_confirm_times ?? (cfg.confirm_times ?? 3);
      const gpuSettings = cfg.release_command_gpu_settings || {};
      this.releaseGpuPresets = Object.keys(gpuSettings)
        .sort((a, b) => Number(a) - Number(b))
        .map(gpu => ({
          key: 'preset_' + gpu,
          gpu,
          mem_threshold_mib: gpuSettings[gpu].mem_threshold_mib ?? this.cfgReleaseCommandThreshold,
          check_interval: gpuSettings[gpu].check_interval ?? this.cfgReleaseCommandInterval,
          confirm_times: gpuSettings[gpu].confirm_times ?? this.cfgReleaseCommandConfirm,
          enabled: gpuSettings[gpu].enabled ?? this.cfgReleaseCommandEnabled,
          notify_enabled: gpuSettings[gpu].notify_enabled ?? this.cfgReleaseCommandNotify,
          launcher: gpuSettings[gpu].launcher || this.cfgReleaseCommandLauncher,
        }));
	      this.ensureCurrentGpuReleasePreset();
	      this.syncReleaseCommands(cfg.release_commands || [], true);
	      this.tmuxStatus = cfg.tmux_status || this.tmuxStatus;
	      this.zellijStatus = cfg.zellij_status || this.zellijStatus;
      const envScKeys = env.env_serverchan_keys || [];
      const envBarkConfigs = env.env_bark_configs || [];
      const scKeys = [...(cfg.serverchan_keys || [])];
      if (cfg.sendkey && !scKeys.includes(cfg.sendkey)) scKeys.unshift(cfg.sendkey);
      for (const k of envScKeys) { if (!scKeys.includes(k)) scKeys.push(k); }
      this.cfgServerchanKeys = scKeys.join('\n');
      const seenBark = new Set();
      const allBark = [];
      for (const b of [...(cfg.bark_configs || []), ...envBarkConfigs]) {
        const sig = `${b.url}|${b.key}`;
        if (!seenBark.has(sig)) { seenBark.add(sig); allBark.push({url: b.url||'', key: b.key||''}); }
      }
      this.barkConfigs = allBark;
      if (env.env_active) {
        const parts = [];
        if (env.env_serverchan_count) parts.push(`Server Chan ${env.env_serverchan_count} 个`);
        if (env.env_bark_count) parts.push(`Bark ${env.env_bark_count} 个`);
        this.envChannelMsg = {
          text: `已合并来自 .env 的通知渠道（${parts.join('，')}），保存后将从 .env 中清除并迁移至配置文件。`,
          kind: 'warn',
        };
      } else {
        this.envChannelMsg = {text:'', kind:''};
      }
    },

    parsePositiveInt(val, label) {
      const v = parseInt(val, 10);
      if (!Number.isInteger(v) || v <= 0) throw new Error(label + '必须是正整数');
      return v;
    },

    parseGpuList(text, label) {
      const gpusStr = String(text || '').trim();
      const gpus = [];
      if (!gpusStr) return gpus;
      const seen = new Set();
      for (const raw of gpusStr.split(',')) {
        const token = raw.trim();
        if (!token) continue;
        if (!/^\d+$/.test(token)) throw new Error(label + '格式错误，请输入如 0,1,2');
        const v = Number(token);
        if (seen.has(v)) throw new Error(label + '不能重复');
        seen.add(v);
        gpus.push(v);
      }
      return gpus;
    },

    collectReleaseGpuSettings() {
      const release_command_gpu_settings = {};
      const presetSeen = new Set();
      for (const preset of this.releaseGpuPresets) {
        const gpuText = String(preset.gpu ?? '').trim();
        if (!gpuText) throw new Error('GPU 预设索引不能为空');
        if (!/^\d+$/.test(gpuText)) throw new Error('GPU 预设索引格式错误');
        if (presetSeen.has(gpuText)) throw new Error('GPU 预设索引不能重复');
        presetSeen.add(gpuText);
	        release_command_gpu_settings[gpuText] = {
	          mem_threshold_mib: this.parsePositiveInt(preset.mem_threshold_mib, `GPU ${gpuText} 空闲判定阈值`),
	          check_interval: this.parsePositiveInt(preset.check_interval, `GPU ${gpuText} 检测间隔`),
	          confirm_times: this.parsePositiveInt(preset.confirm_times, `GPU ${gpuText} 确认次数`),
	          enabled: preset.enabled !== false,
	          notify_enabled: preset.notify_enabled !== false,
	          launcher: ['detached', 'tmux', 'zellij'].includes(preset.launcher) ? preset.launcher : 'detached',
	        };
      }
      return release_command_gpu_settings;
    },

    setReleaseCommandLauncher(launcher) {
      if (!['detached', 'tmux', 'zellij'].includes(launcher)) return;
      this.cfgReleaseCommandLauncher = launcher;
      this.cfgReleaseCommandTmuxEnabled = launcher === 'tmux';
    },

    collectNotifySettings() {
      const serverchan_keys = this.cfgServerchanKeys.split('\n').map(s => s.trim()).filter(Boolean);
      const bark_configs = [];
      for (const b of this.barkConfigs) {
        const url = b.url.trim();
        const key = b.key.trim();
        if (url && key) {
          bark_configs.push({url, key});
        } else if (url || key) {
          throw new Error('Bark 配置不完整，URL 和设备 Key 均必填');
        }
      }
      return {sendkey: '', serverchan_keys, bark_configs};
    },

    async postSettingsPayload(body, msgKey, successText) {
      try {
        const r = await this.api('/api/settings', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body),
        });
        const payload = await r.json().catch(() => ({}));
        if (r.ok) {
          const text = payload.warning || payload.message || successText;
          const kind = payload.warning ? 'warn' : 'success';
          this[msgKey] = {text, kind};
          setTimeout(() => {
            if (this[msgKey] && this[msgKey].text === text) this[msgKey] = {text:'', kind:''};
          }, 2500);
          return true;
        }
        this[msgKey] = {text: payload.error || '保存失败', kind:'error'};
      } catch(e) {
        this[msgKey] = {text:'保存失败：' + e.message, kind:'error'};
      }
      return false;
    },

    async saveMonitorSettings() {
      let body;
      try {
        body = {
          mem_threshold_mib: this.parsePositiveInt(this.cfgThreshold, '显存告警阈值'),
          check_interval: this.parsePositiveInt(this.cfgInterval, '检测间隔'),
          confirm_times: this.parsePositiveInt(this.cfgConfirm, '确认次数'),
          log_max_size_mb: this.parsePositiveInt(this.cfgLogMb, '日志压缩触发大小'),
          log_archive_keep: this.parsePositiveInt(this.cfgLogKeep, '历史存档保留数量'),
          gpus: this.parseGpuList(this.cfgGpus, 'GPU 索引'),
          display_hostname: this.cfgDisplayHostname.trim(),
          gpu_mem_monitor_enabled: this.cfgMemMonitor,
          main_pid_monitor_enabled: this.cfgMainPidMonitor,
        };
      } catch(err) {
        this.monitorSaveMsg = {text: err.message || '输入不合法', kind:'error'};
        return;
      }
      await this.postSettingsPayload(body, 'monitorSaveMsg', '监控参数已保存');
    },

    async saveReleaseSettings() {
      let body;
      try {
        this.ensureCurrentGpuReleasePreset();
        body = {
	          release_command_gpus: [],
	          release_command_gpu_settings: this.collectReleaseGpuSettings(),
	        };
      } catch(err) {
        this.releaseSaveMsg = {text: err.message || '输入不合法', kind:'error'};
        return;
      }
	      await this.postSettingsPayload(body, 'releaseSaveMsg', `GPU ${this.currentGpuIndex} 任务配置已保存`);
    },

    async saveNotifySettings() {
      let body;
      try {
        body = this.collectNotifySettings();
      } catch(err) {
        this.notifySaveMsg = {text: err.message || '输入不合法', kind:'error'};
        return;
      }
      const ok = await this.postSettingsPayload(body, 'notifySaveMsg', '通知渠道已保存');
      if (ok) this.envChannelMsg = {text:'', kind:''};
    },

    // ── Release Commands ─────────────────────────────
    toggleReleasePanel(key) {
      this.releasePanelOpen = {...this.releasePanelOpen, [key]: !this.releasePanelOpen[key]};
    },

    toggleReleaseGroup(key) {
      this.releaseGroupOpen = {...this.releaseGroupOpen, [key]: !this.isReleaseGroupOpen(key)};
    },

    isReleaseGroupOpen(key) {
      return this.releaseGroupOpen[key] !== false;
    },

    addReleaseGpuPreset() {
      const existing = new Set(this.releaseGpuPresets.map(p => String(p.gpu ?? '').trim()).filter(Boolean));
      let gpu = 0;
      while (existing.has(String(gpu))) gpu += 1;
      this.releaseGpuPresets.push({
        key: 'preset_' + Math.random().toString(36).slice(2) + Date.now(),
        gpu: String(gpu),
        mem_threshold_mib: this.cfgReleaseCommandThreshold,
        check_interval: this.cfgReleaseCommandInterval,
        confirm_times: this.cfgReleaseCommandConfirm,
      });
    },

    removeReleaseGpuPreset(index) {
      this.releaseGpuPresets.splice(index, 1);
    },

    parseReleaseGpuListLoose(text) {
      const raw = String(text || '').trim();
      if (!raw) return [];
      const out = [];
      const seen = new Set();
      for (const part of raw.split(',')) {
        const token = part.trim();
        if (!/^\d+$/.test(token)) continue;
        const gpu = Number(token);
        if (!seen.has(gpu)) {
          seen.add(gpu);
          out.push(gpu);
        }
      }
      return out;
    },

    releaseCommandTargetGpus(value) {
      if (!Array.isArray(value)) return [];
      const out = [];
      const seen = new Set();
      for (const item of value) {
        if (!Number.isInteger(item) || item < 0 || seen.has(item)) continue;
        seen.add(item);
        out.push(item);
      }
      return out;
    },

    releaseCommandGroupKey(gpus) {
      const normalized = this.releaseCommandTargetGpus(gpus);
      return normalized.length ? 'gpu:' + normalized.join(',') : 'any';
    },

    releaseCommandTargetLabel(gpus) {
      const normalized = this.releaseCommandTargetGpus(gpus);
      return normalized.length ? 'GPU ' + normalized.join(',') : '任意 GPU';
    },

    releaseSettingsForGroup(gpus) {
      const defaults = {
        mem_threshold_mib: this.cfgReleaseCommandThreshold,
        check_interval: this.cfgReleaseCommandInterval,
        confirm_times: this.cfgReleaseCommandConfirm,
      };
      const normalized = this.releaseCommandTargetGpus(gpus);
      if (normalized.length !== 1) return defaults;
      const preset = this.releaseCommandPresetMap[String(normalized[0])];
      if (!preset) return defaults;
      return {
        mem_threshold_mib: preset.mem_threshold_mib || defaults.mem_threshold_mib,
        check_interval: preset.check_interval || defaults.check_interval,
        confirm_times: preset.confirm_times || defaults.confirm_times,
      };
    },

    releaseCommandStatusText(value) {
      const cmd = value && typeof value === 'object' ? value : null;
      const status = cmd ? cmd.status : value;
      if (cmd?.paused && status === 'pending') return '已暂停';
      return {
        pending: '待执行',
        running: '运行中',
        success: '成功',
        failed: '失败',
      }[status] || status || '未知';
    },

	    releaseCommandStatusStyle(value) {
	      const cmd = value && typeof value === 'object' ? value : null;
	      const status = cmd ? cmd.status : value;
	      if (cmd?.paused && status === 'pending') return 'background:#e2e8f0;color:#64748b';
	      if (status === 'running') return 'background:#dbeafe;color:#2563eb';
	      if (status === 'success') return 'background:#dcfce7;color:#16a34a';
	      if (status === 'failed') return 'background:#fee2e2;color:#ef4444';
	      return 'background:#fef3c7;color:#d97706';
	    },

	    releaseCommandLauncherLabel(launcher) {
	      if (launcher === 'tmux') return 'tmux';
	      if (launcher === 'zellij') return 'zellij';
	      return '后台日志';
	    },

	    releaseCommandAttachText(cmd) {
	      const session = cmd.terminal_session || cmd.tmux_session || cmd.zellij_session || '';
	      if (!session) return '';
	      if (cmd.launcher === 'tmux') return `tmux attach -t ${session}`;
	      if (cmd.launcher === 'zellij') return `zellij attach ${session}`;
	      return `session ${session}`;
	    },

	    releaseCommandTmuxAttachText(cmd) {
	      const session = cmd.tmux_session || (cmd.launcher === 'tmux' ? cmd.terminal_session : '') || '';
	      return session ? `tmux attach -t ${session}` : '';
	    },

	    async copyReleaseCommandAttach(cmd) {
	      const attach = this.releaseCommandTmuxAttachText(cmd);
	      if (!attach) return;
	      try {
	        if (navigator.clipboard?.writeText) {
	          await navigator.clipboard.writeText(attach);
	        } else {
	          const input = document.createElement('textarea');
	          input.value = attach;
	          input.style.position = 'fixed';
	          input.style.opacity = '0';
	          document.body.appendChild(input);
	          input.select();
	          document.execCommand('copy');
	          input.remove();
	        }
	        this.releaseCommandMsg = {text:`已复制：${attach}`, kind:'success'};
	      } catch (err) {
	        this.releaseCommandMsg = {text:'复制失败，请手动选择连接指令', kind:'error'};
	      }
	    },

	    startReleaseCommandDrag(event, cmd) {
	      if (cmd.status === 'running') {
	        event.preventDefault();
	        return;
	      }
	      this.draggedReleaseCommandId = cmd.id;
	      event.dataTransfer.effectAllowed = 'move';
	      event.dataTransfer.setData('text/plain', cmd.id);
	    },

	    overReleaseCommandDrag(event, cmd) {
	      if (!this.draggedReleaseCommandId || this.draggedReleaseCommandId === cmd.id) {
	        this.dragOverReleaseCommandId = '';
	        return;
	      }
	      const rect = event.currentTarget.getBoundingClientRect();
	      this.dragOverReleaseCommandId = cmd.id;
	      this.dragOverReleaseCommandPosition = event.clientY < rect.top + rect.height / 2 ? 'before' : 'after';
	      event.dataTransfer.dropEffect = 'move';
	    },

	    endReleaseCommandDrag() {
	      this.draggedReleaseCommandId = '';
	      this.dragOverReleaseCommandId = '';
	      this.dragOverReleaseCommandPosition = 'before';
	    },

	    async dropReleaseCommand(event, target) {
	      const sourceId = this.draggedReleaseCommandId || event.dataTransfer.getData('text/plain');
	      const position = this.dragOverReleaseCommandPosition;
	      this.endReleaseCommandDrag();
	      if (!sourceId || !target?.id || sourceId === target.id) return;
	      const r = await this.api('/api/release-commands/reorder', {
	        method:'POST', headers:{'Content-Type':'application/json'},
	        body: JSON.stringify({source_id: sourceId, target_id: target.id, position}),
	      });
	      const payload = await r.json().catch(() => ({}));
	      this.releaseCommandMsg = {
	        text: payload.warning||payload.message||(r.ok?'任务顺序已更新':'排序失败'),
	        kind: r.ok ? (payload.warning?'warn':'success') : 'error',
	      };
	      await this.refreshReleaseCommands();
	    },

	    terminalStatusStyle(status) {
	      return status?.installed
	        ? 'background:#dcfce7;color:#16a34a'
	        : 'background:#fee2e2;color:#ef4444';
	    },

	    tmuxStatusStyle() {
	      return this.terminalStatusStyle(this.tmuxStatus);
	    },

	    taskSummaryForGpu(gpu) {
	      const stats = {pending: 0, paused: 0, running: 0, done: 0};
	      for (const cmd of this.releaseCommands) {
	        const gpus = this.releaseCommandTargetGpus(cmd.target_gpus);
	        if (gpus.length && !gpus.includes(gpu)) continue;
	        if (cmd.status === 'running') stats.running += 1;
	        else if (cmd.status === 'pending' && cmd.paused) stats.paused += 1;
	        else if (cmd.status === 'pending') stats.pending += 1;
	        else if (cmd.status === 'success' || cmd.status === 'failed') stats.done += 1;
	      }
	      if (!stats.pending && !stats.paused && !stats.running && !stats.done) return '无';
	      return `待 ${stats.pending} / 暂停 ${stats.paused} / 运行 ${stats.running} / 完成 ${stats.done}`;
	    },

	    ensureCurrentGpuReleasePreset() {
	      if (this.currentGpuIndex === null || this.currentGpuIndex === undefined) return;
	      if (this.currentGpuReleasePreset) return this.currentGpuReleasePreset;
	      this.releaseGpuPresets.push({
	        key: 'preset_' + Math.random().toString(36).slice(2) + Date.now(),
	        gpu: String(this.currentGpuIndex),
	        mem_threshold_mib: this.cfgReleaseCommandThreshold,
	        check_interval: this.cfgReleaseCommandInterval,
	        confirm_times: this.cfgReleaseCommandConfirm,
	        enabled: this.cfgReleaseCommandEnabled,
	        notify_enabled: this.cfgReleaseCommandNotify,
	        launcher: this.cfgReleaseCommandLauncher,
	      });
	      return this.currentGpuReleasePreset;
	    },

	    setCurrentGpuReleaseLauncher(launcher) {
	      if (!['detached', 'tmux', 'zellij'].includes(launcher)) return;
	      const preset = this.ensureCurrentGpuReleasePreset();
	      if (preset) preset.launcher = launcher;
	    },

    async refreshReleaseCommands() {
      if (!this.confirmReleaseCommandDraftDiscard()) return;
      const r = await this.api('/api/config');
      if (!r.ok) return;
      const cfg = await r.json();
      this.syncReleaseCommands(cfg.release_commands || [], true, true);
    },

    syncReleaseCommands(commands, resetDrafts = false, discardConfirmed = false) {
      if (resetDrafts && !discardConfirmed && !this.confirmReleaseCommandDraftDiscard()) return false;
      const next = Array.isArray(commands) ? commands : [];
      const drafts = {...this.releaseCommandDrafts};
      for (const cmd of next) {
        if (resetDrafts || !drafts[cmd.id] || !(cmd.status === 'pending' && cmd.paused)) {
          drafts[cmd.id] = {note: cmd.note || '', command: cmd.command || ''};
        }
      }
      for (const id of Object.keys(drafts)) {
        if (!next.some(cmd => cmd.id === id)) delete drafts[id];
      }
      this.releaseCommands = next;
      this.releaseCommandDrafts = drafts;
      return true;
    },

    hasUnsavedReleaseCommandEdits() {
      return this.releaseCommands.some(cmd => this.releaseCommandHasChanges(cmd));
    },

    confirmReleaseCommandDraftDiscard() {
      if (!this.hasUnsavedReleaseCommandEdits()) return true;
      return confirm('任务队列中有未保存的修改，继续操作将丢失这些修改，是否继续？');
    },

    releaseCommandHasChanges(cmd) {
      const draft = this.releaseCommandDrafts[cmd?.id];
      if (!draft) return false;
      return draft.note !== (cmd.note || '') || draft.command !== (cmd.command || '');
    },

    async addReleaseCommand() {
      const command = this.newReleaseCommand.trim();
	      if (!command) {
	        this.releaseCommandMsg = {text:'任务指令不能为空', kind:'error'};
        return;
      }
      if (this.currentGpuIndex === null || this.currentGpuIndex === undefined) {
        this.releaseCommandMsg = {text:'无法确定当前 GPU', kind:'error'};
        return;
      }
      const target_gpus = [Number(this.currentGpuIndex)];
      const r = await this.api('/api/release-commands/add', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({command, note: this.newReleaseCommandNote.trim(), target_gpus}),
      });
      const payload = await r.json().catch(() => ({}));
      if (r.ok) {
        this.newReleaseCommand = '';
	        this.newReleaseCommandNote = '';
	        this.releaseCommandMsg = {text: payload.warning||payload.message||'任务已加入队列', kind: payload.warning?'warn':'success'};
        await this.refreshReleaseCommands();
        return;
      }
      this.releaseCommandMsg = {text: payload.error||'添加失败', kind:'error'};
    },

    async removeReleaseCommand(id) {
      if (!id) return;
      const cmd = this.releaseCommands.find(item => item.id === id);
      const label = cmd?.note || id;
      if (!confirm(`确认删除任务“${label}”？`)) return;
      const r = await this.api('/api/release-commands/remove', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({id}),
      });
      const payload = await r.json().catch(() => ({}));
      this.releaseCommandMsg = {
	        text: payload.warning||payload.message||(r.ok?'任务已移除':'移除失败'),
        kind: r.ok ? (payload.warning?'warn':'success') : 'error',
      };
      await this.refreshReleaseCommands();
    },

    async toggleReleaseCommandPaused(cmd) {
      if (!cmd?.id || cmd.status !== 'pending') return;
      const paused = !cmd.paused;
      if (!paused && !this.confirmReleaseCommandDraftDiscard()) return;
      const r = await this.api('/api/release-commands/pause', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({id: cmd.id, paused}),
      });
      const payload = await r.json().catch(() => ({}));
      this.releaseCommandMsg = {
        text: payload.warning||payload.message||(r.ok ? (paused?'任务已暂停':'任务已恢复') : '操作失败'),
        kind: r.ok ? (payload.warning?'warn':'success') : 'error',
      };
      await this.refreshReleaseCommands();
    },

    async saveEditReleaseCommand(cmd) {
      if (!cmd || cmd.status !== 'pending' || !cmd.paused) return;
      const draft = this.releaseCommandDrafts[cmd.id];
      if (!draft) return;
      const command = draft.command.trim();
      if (!command) {
        this.releaseCommandMsg = {text:'任务指令不能为空', kind:'error'};
        return;
      }
      const r = await this.api('/api/release-commands/edit', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          id: cmd.id,
          command,
          note: draft.note.trim(),
        }),
      });
      const payload = await r.json().catch(() => ({}));
      this.releaseCommandMsg = {
        text: payload.warning || payload.message || (r.ok ? '任务已更新' : '更新失败'),
        kind: r.ok ? (payload.warning ? 'warn' : 'success') : 'error',
      };
      if (r.ok && payload.command) {
        cmd.note = payload.command.note || '';
        cmd.command = payload.command.command || '';
      }
      await this.refreshReleaseCommands();
    },

    async clearReleaseCommands(scope) {
	      const label = scope === 'pending' ? '待执行任务' : (scope === 'all' ? '全部非运行任务' : '已完成任务');
      if (!confirm(`确认清理${label}？`)) return;
      const r = await this.api('/api/release-commands/clear', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({scope}),
      });
      const payload = await r.json().catch(() => ({}));
      this.releaseCommandMsg = {
        text: payload.warning||payload.message||(r.ok?'已清理':'清理失败'),
        kind: r.ok ? (payload.warning?'warn':'success') : 'error',
      };
      await this.refreshReleaseCommands();
    },

    async requeueReleaseCommand(id) {
      const r = await this.api('/api/release-commands/requeue', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({id}),
      });
      const payload = await r.json().catch(() => ({}));
      this.releaseCommandMsg = {
	        text: payload.warning||payload.message||(r.ok?'任务已重新排队':'重新排队失败'),
        kind: r.ok ? (payload.warning?'warn':'success') : 'error',
      };
      await this.refreshReleaseCommands();
    },

    // ── Agent Config ──────────────────────────────────
    async loadAgentConfig() {
      try {
        const r = await this.api('/api/agent/config');
        if (!r.ok) return;
        const cfg = await r.json();
        this.cfgAgentEnabled = !!cfg.agent_enabled;
        this.cfgLlmBaseUrl = cfg.llm_base_url || '';
        this.cfgLlmApiKey = cfg.llm_api_key || '';
        this.cfgLlmModel = cfg.llm_model || '';
        this.cfgLlmMaxIter = cfg.llm_max_iterations ?? 8;
        this.cfgLlmTimeout = cfg.llm_request_timeout ?? 30;
        this.cfgLlmTemp = cfg.llm_temperature ?? 0.2;
        this.cfgAgentStream = cfg.agent_stream_enabled !== false;
        this.agentEnabled = !!cfg.agent_enabled;
        if (!this.agentEnabled) {
          this.agentChatOpen = false;
          if (this.currentTab === 'agent') {
            this.currentTab = 'gpu';
            this.fetchState();
          }
        }
        this.$nextTick(() => this.updateAgentPaneHeight());
      } catch(e) {}
    },

    async saveAgentConfig() {
      const body = {
        agent_enabled: this.cfgAgentEnabled,
        agent_stream_enabled: this.cfgAgentStream,
        llm_base_url: this.cfgLlmBaseUrl.trim(),
        llm_api_key: this.cfgLlmApiKey.trim(),
        llm_model: this.cfgLlmModel.trim(),
        llm_max_iterations: parseInt(this.cfgLlmMaxIter) || 8,
        llm_request_timeout: parseInt(this.cfgLlmTimeout) || 30,
        llm_temperature: parseFloat(this.cfgLlmTemp) || 0.2,
      };
      try {
        const r = await this.api('/api/agent/config', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body),
        });
        const d = await r.json();
        this.agentSaveMsg = {text: d.ok?'Agent 配置已保存':(d.error||'保存失败'), kind: d.ok?'success':'error'};
        setTimeout(() => { this.agentSaveMsg = {text:'',kind:''}; }, 3000);
        await this.loadAgentConfig();
      } catch(e) {
        this.agentSaveMsg = {text:'保存失败：'+e.message, kind:'error'};
      }
    },

    // ── Log ───────────────────────────────────────────
    async loadLog() {
      const r = await this.api('/api/log');
      if (!r.ok) return;
      this.logEntries = await r.json();
    },

    async loadArchives() {
      const r = await this.api('/api/log/archives');
      if (!r.ok) return;
      this.archives = await r.json();
    },

    async clearEventLog() {
      if (!confirm('确认清空当前事件日志？历史存档不会被删除。')) return;
      const r = await this.api('/api/log/clear', {method:'POST'});
      const payload = await r.json().catch(() => ({}));
      if (r.ok) {
        this.logEntries = [];
        this.logDetailIdx = null;
        this.logView = 'list';
        this.showToast(`已清空 ${payload.removed_count ?? 0} 条事件日志`, true);
        return;
      }
      this.showToast(payload.error || '清空日志失败', false);
    },

    async deleteArchive(filename) {
      if (!filename) return;
      if (!confirm(`确认删除历史存档 ${filename}？`)) return;
      const r = await this.api('/api/log/archives/' + encodeURIComponent(filename), {method:'DELETE'});
      const payload = await r.json().catch(() => ({}));
      if (r.ok) {
        this.archives = this.archives.filter(a => a.filename !== filename);
        this.showToast('历史存档已删除', true);
        return;
      }
      this.showToast(payload.error || '删除历史存档失败', false);
    },

    // ── Notify ────────────────────────────────────────
    async sendTestNotify() {
      try {
        const r = await this.api('/api/notify/test', {method:'POST'});
        const payload = await r.json().catch(() => ({}));
        this.showToast(r.ok ? (payload.message||'已发送') : (payload.error||'发送失败'), r.ok);
      } catch(e) {
        this.showToast('请求出错', false);
      }
    },

    // ── Password ──────────────────────────────────────
    async changePassword() {
      if (!this.curPwd || !this.newPwd) {
        this.pwdMsg = {text:'请填写当前密码和新密码', kind:'error'}; return;
      }
      if (this.newPwd !== this.confirmPwd) {
        this.pwdMsg = {text:'两次输入的新密码不一致', kind:'error'}; return;
      }
      const r = await this.api('/api/settings', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({current_password: this.curPwd, new_password: this.newPwd}),
      });
      const payload = await r.json().catch(() => ({}));
      if (r.ok) {
        this.pwdMsg = {text: payload.message||'密码已修改', kind:'success'};
        setTimeout(() => { this.pwdModalOpen = false; this.pwdMsg = {text:'',kind:''}; }, 1200);
      } else {
        this.pwdMsg = {text: payload.error||'修改失败', kind:'error'};
      }
    },

    // ── Agent ─────────────────────────────────────────
    async openAgentChat() {
      if (this.isMobileAgent || !this.agentEnabled) return;
      this.agentChatOpen = true;
      this.agentUnread = false;
      await this.loadAgentConfig();
      this.$nextTick(() => {
        if (!this.agentPanelVisible) return;
        this.scrollAgentToBottom();
        this.initAgentInputResize();
        if (this.$refs.agentInput) this.$refs.agentInput.focus();
      });
    },

    closeAgentChat() {
      this.agentChatOpen = false;
      this.$nextTick(() => {
        if (this.$refs.agentLauncher) this.$refs.agentLauncher.focus();
      });
    },

    toggleAgentChat() {
      if (this.agentChatOpen) this.closeAgentChat();
      else this.openAgentChat();
    },

    handleGlobalKeydown(e) {
      if (e.key === 'Escape' && !this.isMobileAgent && this.agentChatOpen) this.closeAgentChat();
    },

    scrollAgentToBottom() {
      const el = this.$refs.agentMessages;
      if (el) el.scrollTop = el.scrollHeight;
    },

    async agentSend() {
      if (this.agentBusy) return;
      const msg = this.agentInput.trim();
      if (!msg) return;
      this.agentInput = '';
      if (this.$refs.agentInput) this.$refs.agentInput.style.height = '';

      if (!this.agentSessionId) {
        this.agentSessionId = 'sess_' + Math.random().toString(36).slice(2) + Date.now();
      }

      this.agentMessages.push({role:'user', content:msg});
      this.agentHistory.push({role:'user', content:msg, tool_trace:[]});

      const assistantIdx = this.agentMessages.length;
      this.agentMessages.push({
        role:'assistant', content:'', toolTrace:[], pendingActions:[],
        streaming:true, traceOpen:false, confirmResult:null,
      });
      this.agentBusy = true;
      this.agentAbortCtrl = new AbortController();
      this.$nextTick(() => this.scrollAgentToBottom());

      try {
        if (this.cfgAgentStream) {
          await this._agentSendStream(assistantIdx, msg);
        } else {
          await this._agentSendSync(assistantIdx, msg);
        }
      } catch(e) {
        const m = this.agentMessages[assistantIdx];
        if (m) {
          const errText = e.name === 'AbortError' ? '已中断' : '网络错误：' + e.message;
          this.agentMessages[assistantIdx] = {role:'error', content: errText, streaming:false};
        }
      } finally {
        this.agentBusy = false;
        this.agentAbortCtrl = null;
        const m = this.agentMessages[assistantIdx];
        if (m) m.streaming = false;
        if (!this.agentPanelVisible) this.agentUnread = true;
        this.$nextTick(() => {
          if (this.agentPanelVisible && this.$refs.agentInput) this.$refs.agentInput.focus();
        });
      }
    },

    async _agentSendStream(assistantIdx, msg) {
      const resp = await this.api('/api/agent/chat/stream', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({session_id: this.agentSessionId, message: msg}),
        signal: this.agentAbortCtrl.signal,
      });
      if (!resp.ok) {
        const d = await resp.json().catch(() => ({}));
        this.agentMessages[assistantIdx] = {role:'error', content: d.error||'请求失败', streaming:false};
        return;
      }
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream:true});
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(line.slice(6)); } catch { continue; }
          const m = this.agentMessages[assistantIdx];
          if (!m) continue;
          if (event.type === 'tool_call') {
            m.toolTrace.push(event);
          } else if (event.type === 'text_delta') {
            m.content += event.delta;
            this.$nextTick(() => this.scrollAgentToBottom());
          } else if (event.type === 'done') {
            m.streaming = false;
            m.pendingActions = event.pending_actions || [];
            this.agentHistory.push({role:'assistant', content:event.reply, tool_trace:event.tool_trace||[]});
          } else if (event.type === 'error') {
            this.agentMessages[assistantIdx] = {role:'error', content: event.error||'请求失败', streaming:false};
          }
        }
      }
    },

    async _agentSendSync(assistantIdx, msg) {
      const r = await this.api('/api/agent/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({session_id: this.agentSessionId, message: msg}),
        signal: this.agentAbortCtrl.signal,
      });
      const d = await r.json();
      if (d.ok) {
        this.agentMessages[assistantIdx] = {
          role:'assistant', content: d.reply,
          toolTrace: d.tool_trace||[], pendingActions: d.pending_actions||[],
          streaming:false, traceOpen:false, confirmResult:null,
        };
        this.agentHistory.push({role:'assistant', content:d.reply, tool_trace:d.tool_trace||[]});
      } else {
        this.agentMessages[assistantIdx] = {role:'error', content: d.error||'请求失败', streaming:false};
      }
      this.$nextTick(() => this.scrollAgentToBottom());
    },

    agentInterrupt() {
      if (this.agentAbortCtrl) this.agentAbortCtrl.abort();
    },

    async agentConfirm(approved, rejected, msgIdx) {
      try {
        const r = await this.api('/api/agent/confirm', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({session_id: this.agentSessionId, approved, rejected}),
        });
        const d = await r.json();
        const m = this.agentMessages[msgIdx];
        if (m) {
          const succeeded = d.executed?.filter(e => e.ok).length || 0;
          m.pendingActions = [];
          m.confirmResult = `✓ 已执行 ${succeeded} 项操作${rejected.length ? '，' + rejected.length + ' 项已忽略' : ''}`;
        }
        if (d.executed?.some(e => e.ok)) {
          this.fetchState();
          if (this.currentTab === 'settings') this.loadSettings();
        }
        if (!this.agentPanelVisible) this.agentUnread = true;
      } catch(e) {
        this.showToast('确认失败：' + e.message, false);
      }
    },

    async agentClear() {
      if (this.agentSessionId) {
        await this.api(`/api/agent/session/${this.agentSessionId}`, {method:'DELETE'});
      }
      this.agentSessionId = null;
      this.agentHistory = [];
      this.agentMessages = [];
      this.agentUnread = false;
    },

    agentExport() {
      if (!this.agentHistory.length) { this.showToast('暂无对话内容', false); return; }
      const lines = ['# Agent 对话记录', '', `> 导出时间：${new Date().toLocaleString('zh-CN')}`, ''];
      this.agentHistory.forEach(m => {
        if (m.role === 'user') {
          lines.push(`**用户**\n\n${m.content}`, '');
        } else {
          lines.push(`**助手**\n\n${m.content}`);
          if (m.tool_trace && m.tool_trace.length) {
            lines.push('', `<details><summary>工具调用（${m.tool_trace.length} 步）</summary>`, '');
            m.tool_trace.forEach(t => {
              lines.push(`- \`${t.name}(${JSON.stringify(t.args)})\` → ${t.summary}`);
            });
            lines.push('', '</details>');
          }
          lines.push('');
        }
      });
      const blob = new Blob([lines.join('\n')], {type:'text/markdown;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `agent-chat-${new Date().toISOString().slice(0,10)}.md`;
      a.click();
      URL.revokeObjectURL(url);
    },

    agentInputKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        this.agentSend();
      }
    },

    initAgentInputResize() {
      if (this._resizeBound) return;
      const handle = this.$refs.agentResizeHandle;
      const input = this.$refs.agentInput;
      if (!handle || !input) return;
      this._resizeBound = true;
      handle.addEventListener('pointerdown', e => {
        e.preventDefault();
        handle.setPointerCapture(e.pointerId);
        const startY = e.clientY;
        const startH = input.offsetHeight;
        const onMove = ev => {
          const panelHeight = this.$refs.agentWindow?.clientHeight || window.innerHeight;
          const min = 42, max = Math.max(96, Math.floor(panelHeight * 0.45));
          input.style.height = Math.max(min, Math.min(max, startH + startY - ev.clientY)) + 'px';
        };
        const onUp = ev => {
          handle.releasePointerCapture(ev.pointerId);
          handle.removeEventListener('pointermove', onMove);
          handle.removeEventListener('pointerup', onUp);
          handle.removeEventListener('pointercancel', onUp);
        };
        handle.addEventListener('pointermove', onMove);
        handle.addEventListener('pointerup', onUp);
        handle.addEventListener('pointercancel', onUp);
      });
    },

    // ── Markdown ──────────────────────────────────────
    renderMd(text) {
      if (!text) return '';
      return DOMPurify.sanitize(marked.parse(text));
    },

    pendingLabel(a) {
      const note = a.note ? ' · ' + this.escHtml(a.note) : '';
      if (a.action === 'add_watch_pid')
        return `添加监控 <code>PID ${a.pid}</code>${note}`;
      if (a.action === 'remove_watch_pid')
        return `移除监控 <code>PID ${a.pid}</code>`;
      if (a.action === 'set_monitor_settings')
        return `更新监控参数 <code>${this.escHtml(JSON.stringify(a.settings || {}))}</code>`;
	      if (a.action === 'add_release_command') {
	        const cmd = this.escHtml((a.command || '').slice(0, 120));
	        const target = this.releaseCommandTargetLabel(a.target_gpus || []);
	        return `添加任务 <code>${cmd}${(a.command || '').length > 120 ? '…' : ''}</code> · ${this.escHtml(target)}${note}`;
	      }
	      if (a.action === 'remove_release_command')
	        return `移除任务 <code>${this.escHtml(a.command_id || ('#' + a.index))}</code>`;
	      if (a.action === 'clear_release_commands')
	        return `清理任务 <code>${this.escHtml(a.scope || 'finished')}</code>`;
	      if (a.action === 'requeue_release_command')
	        return `重新排队任务 <code>${this.escHtml(a.command_id || ('#' + a.index))}</code>`;
      if (a.action === 'test_notification')
        return '发送测试通知';
      if (a.action === 'send_notification_message')
        return `发送通知 <code>${this.escHtml(a.title || '')}</code>`;
      return this.escHtml(a.action || '未知操作');
    },

    // ── Util ──────────────────────────────────────────
    barColor(pct) {
      if (pct >= 80) return 'linear-gradient(90deg,#ef4444,#f87171)';
      if (pct >= 60) return 'linear-gradient(90deg,#f59e0b,#fbbf24)';
      return 'linear-gradient(90deg,#22c55e,#4ade80)';
    },

    ringStyle(pct) {
      const value = Math.max(0, Math.min(100, Number(pct) || 0));
      const color = value >= 80 ? '#ef4444' : (value >= 60 ? '#f59e0b' : '#22c55e');
      return {'--ring-progress': value + '%', '--ring-color': color};
    },

    gpuBadgeStyle(pct) {
      if (pct >= 80) return 'background:#fee2e2;color:#ef4444';
      if (pct >= 60) return 'background:#fef3c7;color:#d97706';
      return 'background:#dbeafe;color:#2563eb';
    },

    diskTypeStyle(type) {
      if (type === 'SSD') return 'background:#dbeafe;color:#2563eb';
      if (type === 'HDD') return 'background:#fef3c7;color:#d97706';
      return 'background:#f1f5f9;color:#64748b';
    },

    formatMib(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n <= 0) return '0 MiB';
      if (n >= 1024) return (n / 1024).toFixed(1) + ' GB';
      return Math.round(n) + ' MiB';
    },

    tagLabel(type) { return TAG_LABELS[type] || type; },
    tagClass(type) { return TAG_CLASSES[type] || 'tag-info'; },

    fmtStartTime(s) {
      if (!s) return '—';
      const p = s.trim().split(/\s+/);
      if (p.length >= 5) return `${p[1]} ${p[2]} ${p[3].slice(0,5)}`;
      return s;
    },

    escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    },
  },

  mounted() {
    this.initUiAppearance();
    this.handleViewportChange();
    this.checkAuth();
    window.addEventListener('resize', this.handleViewportChange);
    if (window.visualViewport) window.visualViewport.addEventListener('resize', this.updateAgentPaneHeight);
    document.addEventListener('keydown', this.handleGlobalKeydown);
    document.addEventListener('click', e => {
      const dd = this.$refs.headerDropdown;
      if (dd && !dd.contains(e.target)) this.dropdownOpen = false;
    });
  },

  beforeUnmount() {
    window.removeEventListener('resize', this.handleViewportChange);
    if (window.visualViewport) window.visualViewport.removeEventListener('resize', this.updateAgentPaneHeight);
    document.removeEventListener('keydown', this.handleGlobalKeydown);
    if (this._refreshTimer) clearInterval(this._refreshTimer);
  },
}).mount('#app');
</script>
