<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sserveros</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; font-size: 15px; }

/* Login */
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 32px; width: 100%; max-width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin: 16px; }
.login-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.login-sub { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
.login-input { width: 100%; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 14px; font-size: 15px; outline: none; margin-bottom: 12px; }
.login-input:focus { border-color: #2563eb; }
.login-btn { width: 100%; background: #2563eb; color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; }
.login-error { color: #ef4444; font-size: 13px; margin-top: 10px; display: none; }

/* App shell */
.app { display: none; }
.offline-banner { background: #fee2e2; color: #b91c1c; padding: 10px 16px; font-size: 13px; font-weight: 500; text-align: center; display: none; }
.header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
.header-title { font-weight: 700; font-size: 17px; }
.header-host { font-size: 12px; color: #94a3b8; margin-top: 1px; }
.status-badge { background: #dcfce7; color: #16a34a; font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 500; }
.status-badge.offline { background: #fee2e2; color: #ef4444; }
.logout-btn { font-size: 12px; color: #94a3b8; background: none; border: 1px solid #e2e8f0; border-radius: 8px; padding: 5px 12px; cursor: pointer; margin-left: 10px; }
.pwd-btn { font-size: 12px; color: #64748b; background: none; border: 1px solid #e2e8f0; border-radius: 8px; padding: 5px 10px; cursor: pointer; margin-left: 4px; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 340px; margin: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.modal-title { font-weight: 700; font-size: 16px; margin-bottom: 18px; }
.modal-input { width: 100%; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 14px; font-size: 14px; outline: none; margin-bottom: 10px; }
.modal-input:focus { border-color: #2563eb; }
.modal-actions { display: flex; gap: 8px; margin-top: 4px; }
.modal-submit { flex: 1; background: #2563eb; color: #fff; border: none; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; }
.modal-cancel { background: none; color: #64748b; border: 1px solid #e2e8f0; border-radius: 10px; padding: 11px 16px; font-size: 14px; cursor: pointer; }
.modal-msg { font-size: 13px; margin-top: 8px; display: none; }

/* Tabs */
.tabs { background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; overflow-x: auto; }
.tab { flex: 1; min-width: 70px; padding: 14px 8px; text-align: center; font-size: 14px; color: #94a3b8; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
.tab.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }

/* Panes */
.pane { padding: 16px; max-width: 900px; margin: 0 auto; display: none; flex-direction: column; gap: 14px; }
.pane.active { display: flex; }

/* Generic card */
.card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.card-header { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }

/* GPU */
.gpu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.gpu-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); cursor: pointer; transition: border-color .15s, box-shadow .15s; }
.gpu-card:hover { border-color: #2563eb; box-shadow: 0 2px 10px rgba(37,99,235,0.12); }
.gpu-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.gpu-name { font-weight: 700; font-size: 16px; }
.gpu-model { font-size: 12px; color: #94a3b8; margin-left: 6px; }
.gpu-pct { background: #dbeafe; color: #2563eb; font-size: 12px; padding: 3px 9px; border-radius: 12px; font-weight: 600; }
.bar-bg { background: #e2e8f0; border-radius: 4px; height: 8px; margin-bottom: 8px; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s, background 0.4s; }
.gpu-meta { display: flex; justify-content: space-between; font-size: 13px; color: #64748b; }
.gpu-cmd { font-size: 12px; color: #94a3b8; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.refresh-hint { text-align: center; font-size: 12px; color: #cbd5e1; }

/* GPU detail */
.gpu-stat-row { display: flex; gap: 16px; flex-wrap: wrap; padding: 14px 16px; border-bottom: 1px solid #f1f5f9; }
.gpu-stat { display: flex; flex-direction: column; gap: 2px; }
.gpu-stat-label { font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
.gpu-stat-value { font-size: 16px; font-weight: 700; color: #1e293b; }
.proc-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.proc-table { width: 100%; border-collapse: collapse; }
.proc-table th { text-align: left; font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; padding: 10px 16px 6px; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
.proc-table td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid #f8fafc; vertical-align: top; }
.proc-table tr:last-child td { border-bottom: none; }
.proc-pid-cell { font-weight: 600; color: #1e293b; white-space: nowrap; }
.proc-mem-cell { white-space: nowrap; color: #2563eb; font-weight: 500; }
.proc-cmd-cell { color: #475569; font-family: monospace; font-size: 12px; word-break: break-all; max-width: 400px; }
@media (max-width: 639px) {
  .proc-table thead { display: none; }
  .proc-table, .proc-table tbody, .proc-table tr, .proc-table td { display: block; width: 100%; }
  .proc-table tr { border-bottom: 1px solid #e2e8f0; padding: 10px 0; }
  .proc-table tr:last-child { border-bottom: none; }
  .proc-table td { border: none; padding: 3px 16px; display: flex; gap: 10px; align-items: baseline; font-size: 13px; }
  .proc-table td::before { content: attr(data-label); font-size: 10px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; min-width: 48px; flex-shrink: 0; }
  .proc-cmd-cell { word-break: break-all; font-size: 12px; }
  .proc-table td.proc-cmd-cell { align-items: flex-start; }
}

/* PIDs */
.pid-row { padding: 14px 16px; border-bottom: 1px solid #f8fafc; display: flex; justify-content: space-between; align-items: center; }
.pid-row:last-child { border-bottom: none; }
.pid-num { font-size: 15px; font-weight: 600; }
.pid-cmd { font-size: 12px; color: #94a3b8; margin-top: 2px; max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.badge-alive { background: #dcfce7; color: #16a34a; font-size: 11px; padding: 3px 8px; border-radius: 10px; }
.badge-dead { background: #fee2e2; color: #ef4444; font-size: 11px; padding: 3px 8px; border-radius: 10px; }
.del-btn { background: none; border: none; color: #ef4444; font-size: 20px; cursor: pointer; padding: 4px 8px; line-height: 1; }
.add-row { display: flex; gap: 10px; padding: 14px 16px; flex-wrap: wrap; }
.add-input { flex: 1; min-width: 0; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 14px; font-size: 14px; outline: none; }
.add-input:focus { border-color: #2563eb; }
.add-btn { background: #2563eb; color: #fff; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
@media (max-width: 480px) {
  .add-row { flex-direction: column; gap: 8px; }
  .add-row .add-input { width: 100%; max-width: none !important; }
  .add-btn { width: 100%; padding: 12px; }
}

/* Settings */
.setting-row { padding: 14px 16px; border-bottom: 1px solid #f8fafc; }
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 12px; color: #64748b; margin-bottom: 6px; }
.setting-input { width: 100%; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 14px; font-size: 14px; outline: none; }
.setting-input:focus { border-color: #2563eb; }
.save-btn { background: #2563eb; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; box-shadow: 0 2px 8px rgba(37,99,235,0.3); }
.save-msg { text-align: center; font-size: 13px; color: #16a34a; margin-top: 8px; display: none; }
.notice-msg { font-size: 13px; margin-top: 10px; display: none; text-align: center; }
.notice-msg.success { color: #16a34a; }
.notice-msg.warn { color: #d97706; }
.notice-msg.error { color: #ef4444; }

/* Log list */
.log-row { padding: 12px 16px; border-bottom: 1px solid #f8fafc; display: flex; gap: 10px; align-items: flex-start; cursor: pointer; transition: background .1s; }
.log-row:hover { background: #f8fafc; }
.log-row:last-child { border-bottom: none; }
.log-tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; white-space: nowrap; margin-top: 2px; font-weight: 500; flex-shrink: 0; }
.tag-warn { background: #fee2e2; color: #ef4444; }
.tag-found { background: #dbeafe; color: #2563eb; }
.tag-recover { background: #dcfce7; color: #16a34a; }
.tag-pid { background: #fef3c7; color: #d97706; }
.tag-info { background: #f1f5f9; color: #64748b; }
.log-main { flex: 1; min-width: 0; }
.log-title-text { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.log-time-text { font-size: 12px; color: #94a3b8; margin-top: 2px; }
.log-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.send-ok { font-size: 11px; color: #16a34a; }
.send-fail { font-size: 11px; color: #ef4444; }
.chevron { color: #cbd5e1; font-size: 16px; }

/* Log detail */
.detail-header { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 10px; }
.back-btn { background: none; border: 1px solid #e2e8f0; border-radius: 8px; padding: 5px 12px; font-size: 13px; cursor: pointer; color: #64748b; white-space: nowrap; }
.detail-title-text { font-weight: 600; font-size: 14px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.detail-meta { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; display: flex; flex-direction: column; gap: 10px; }
.meta-row { display: flex; gap: 10px; font-size: 13px; }
.meta-label { color: #94a3b8; width: 64px; flex-shrink: 0; }
.meta-value { color: #1e293b; font-weight: 500; }
.meta-ok { color: #16a34a; font-weight: 600; }
.meta-fail { color: #ef4444; font-weight: 600; }
.detail-body { padding: 14px 16px; }
.detail-body-label { font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.detail-body-content { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; font-size: 13px; color: #334155; line-height: 1.6; white-space: pre; font-family: monospace; max-height: 50vh; overflow-x: auto; overflow-y: auto; }

/* Archive */
.archive-row { padding: 12px 16px; border-bottom: 1px solid #f8fafc; display: flex; justify-content: space-between; align-items: center; }
.archive-row:last-child { border-bottom: none; }
.dl-btn { font-size: 12px; color: #2563eb; background: none; border: 1px solid #dbeafe; border-radius: 8px; padding: 5px 12px; cursor: pointer; }
</style>
</head>
<body>

<!-- ── Login ─────────────────────────────────────────── -->
<div class="login-wrap" id="loginWrap" style="display:none">
  <div class="login-card">
    <div class="login-title">sserveros</div>
    <div class="login-sub">请输入访问密码</div>
    <input class="login-input" type="password" id="loginPwd" placeholder="密码"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">登录</button>
    <div class="login-error" id="loginErr">密码错误，请重试</div>
  </div>
</div>

<!-- ── App ───────────────────────────────────────────── -->
<div class="app" id="app">
  <div class="offline-banner" id="offlineBanner">⚠ 监控脚本未运行</div>

  <div class="header">
    <div>
      <div class="header-title">sserveros</div>
      <div class="header-host" id="headerHost"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="status-badge" id="statusBadge">● 运行中</span>
      <button class="pwd-btn" onclick="openPwdModal()" title="修改密码">🔑</button>
      <button class="logout-btn" onclick="doLogout()">退出</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('gpu')">GPU</div>
    <div class="tab" onclick="switchTab('pids')">PIDs</div>
    <div class="tab" onclick="switchTab('settings')">设置</div>
    <div class="tab" onclick="switchTab('log')">日志</div>
  </div>

  <!-- GPU -->
  <div class="pane active" id="paneGpu">
    <div id="gpuListView">
      <div class="gpu-grid" id="gpuGrid"></div>
      <div class="refresh-hint">每 5 秒自动刷新 · 点击卡片查看进程详情</div>
    </div>
    <div id="gpuDetailView" style="display:none">
      <div class="card">
        <div class="detail-header">
          <button class="back-btn" onclick="showGpuList()">← 返回</button>
          <span class="detail-title-text" id="gpuDetailTitle"></span>
          <button class="back-btn" onclick="refreshGpuDetail()" style="margin-left:auto">刷新</button>
        </div>
        <div class="gpu-stat-row" id="gpuDetailStats"></div>
        <div id="gpuDetailProcs"></div>
      </div>
    </div>
  </div>

  <!-- PIDs -->
  <div class="pane" id="panePids">
    <div class="card">
      <div class="card-header">
        <span>监控 PID 列表</span>
        <span style="font-size:13px;color:#94a3b8;font-weight:400" id="pidCount"></span>
      </div>
      <div id="pidList"></div>
      <div class="add-row">
        <input class="add-input" id="addPidInput" placeholder="PID 号" type="number" style="max-width:110px"
               onkeydown="if(event.key==='Enter')addPid()">
        <input class="add-input" id="addNoteInput" placeholder="备注（可选）"
               onkeydown="if(event.key==='Enter')addPid()">
        <button class="add-btn" onclick="addPid()">添加</button>
      </div>
      <div class="notice-msg" id="pidMsg"></div>
    </div>
  </div>

  <!-- Settings -->
  <div class="pane" id="paneSettings">
    <div class="card">
      <div class="card-header">监控参数</div>
      <div class="setting-row">
        <div class="setting-label">显存告警阈值 (MiB)</div>
        <input class="setting-input" id="cfgThreshold" type="number">
      </div>
      <div class="setting-row">
        <div class="setting-label">检测间隔 (秒)</div>
        <input class="setting-input" id="cfgInterval" type="number">
      </div>
      <div class="setting-row">
        <div class="setting-label">确认次数</div>
        <input class="setting-input" id="cfgConfirm" type="number">
      </div>
      <div class="setting-row">
        <div class="setting-label">SENDKEY</div>
        <input class="setting-input" id="cfgSendkey" placeholder="SCTxxxxxxxx">
      </div>
      <div class="setting-row">
        <div class="setting-label">日志压缩触发大小 (MB)</div>
        <input class="setting-input" id="cfgLogMb" type="number">
      </div>
      <div class="setting-row">
        <div class="setting-label">历史存档保留数量</div>
        <input class="setting-input" id="cfgLogKeep" type="number">
      </div>
      <div class="setting-row">
        <div class="setting-label">监控 GPU 索引（逗号分隔，留空自动检测）</div>
        <input class="setting-input" id="cfgGpus" placeholder="例：0,1,2">
      </div>
    </div>
    <button class="save-btn" onclick="saveSettings()">保存设置</button>
    <div class="save-msg notice-msg" id="saveMsg"></div>
  </div>

  <!-- Log -->
  <div class="pane" id="paneLog">
    <div id="logListView">
      <div class="card">
        <div class="card-header">
          <span>事件日志</span>
          <span style="font-size:13px;color:#94a3b8;font-weight:400">最近 200 条</span>
        </div>
        <div id="logList"></div>
      </div>
      <div class="card" id="archiveCard">
        <div class="card-header">
          <span>历史存档</span>
          <span style="font-size:13px;color:#94a3b8;font-weight:400" id="archiveCount"></span>
        </div>
        <div id="archiveList"></div>
      </div>
    </div>
    <div id="logDetailView" style="display:none">
      <div class="card">
        <div class="detail-header">
          <button class="back-btn" onclick="showLogList()">← 返回</button>
          <span class="detail-title-text" id="detailTitle"></span>
          <span class="log-tag" id="detailTag"></span>
        </div>
        <div class="detail-meta">
          <div class="meta-row">
            <span class="meta-label">时间</span>
            <span class="meta-value" id="detailTime"></span>
          </div>
          <div class="meta-row">
            <span class="meta-label">发送至</span>
            <span class="meta-value" id="detailSendkey"></span>
          </div>
          <div class="meta-row">
            <span class="meta-label">发送状态</span>
            <span id="detailStatus"></span>
          </div>
        </div>
        <div class="detail-body">
          <div class="detail-body-label">通知内容</div>
          <div class="detail-body-content" id="detailContent"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Password Modal -->
<div class="modal-overlay" id="pwdModal" onclick="if(event.target===this)closePwdModal()">
  <div class="modal-box">
    <div class="modal-title">修改密码</div>
    <input class="modal-input" id="cfgCurPwd" type="password" placeholder="当前密码"
           onkeydown="if(event.key==='Enter')changePassword()">
    <input class="modal-input" id="cfgNewPwd" type="password" placeholder="新密码"
           onkeydown="if(event.key==='Enter')changePassword()">
    <input class="modal-input" id="cfgConfirmPwd" type="password" placeholder="再次输入新密码"
           onkeydown="if(event.key==='Enter')changePassword()">
    <div class="modal-msg" id="pwdMsg"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closePwdModal()">取消</button>
      <button class="modal-submit" onclick="changePassword()">确认修改</button>
    </div>
  </div>
</div>

<script>
const TAG_LABELS = { warn:'告警', found:'发现', recover:'恢复', pid:'PID消失', info:'信息' };
const TAG_CLASSES = { warn:'tag-warn', found:'tag-found', recover:'tag-recover', pid:'tag-pid', info:'tag-info' };

let _refreshTimer = null;
let _currentTab = 'gpu';
let _appStarted = false;

// ── Helpers ──────────────────────────────────────────────

async function api(path, opts = {}) {
  const r = await fetch(path, opts);
  if (r.status === 401 && path !== '/api/auth/login') {
    location.reload();
  }
  return r;
}

function $(id) { return document.getElementById(id); }

function showMessage(targetId, text, kind = 'success') {
  const el = $(targetId);
  el.className = 'notice-msg ' + kind;
  el.textContent = text;
  el.style.display = text ? 'block' : 'none';
}

// ── Auth ─────────────────────────────────────────────────

async function doLogin() {
  const pwd = $('loginPwd').value;
  const r = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  });
  if (r.ok) {
    showApp();
  } else {
    $('loginErr').style.display = 'block';
  }
}

async function doLogout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  location.reload();
}

function showApp() {
  $('loginWrap').style.display = 'none';
  $('app').style.display = 'block';
  startApp();
}

// ── Bootstrap ────────────────────────────────────────────

function startApp() {
  if (_appStarted) return;
  _appStarted = true;
  $('headerHost').textContent = '机器: ' + location.hostname;
  startStateRefresh();
}

// Silent auth check on page load
(async function checkAuth() {
  try {
    const r = await fetch('/api/state');
    if (r.ok) {
      showApp();
      return;
    }
  } catch (e) {}
  $('loginWrap').style.display = 'flex';
})();

// ── Tab switching ────────────────────────────────────────

function switchTab(name) {
  _currentTab = name;
  const TABS = ['gpu', 'pids', 'settings', 'log'];
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', TABS[i] === name);
  });
  document.querySelectorAll('.pane').forEach(el => {
    const active = el.id === 'pane' + name[0].toUpperCase() + name.slice(1);
    el.classList.toggle('active', active);
  });
  if (name === 'gpu' || name === 'pids') fetchState();
  if (name === 'pids') loadPids();
  if (name === 'settings') loadSettings();
  if (name === 'log') { loadLog(); loadArchives(); }
}

// ── State ────────────────────────────────────────────────

function startStateRefresh() {
  if (_refreshTimer) return;
  fetchState();
  _refreshTimer = setInterval(fetchState, 5000);
}

function stopStateRefresh() {
  if (_refreshTimer) { clearInterval(_refreshTimer); _refreshTimer = null; }
}

async function fetchState() {
  try {
    const r = await api('/api/state');
    if (!r.ok) return;
    const data = await r.json();
    renderGpu(data);
    if (data.hostname) $('headerHost').textContent = '机器: ' + data.hostname;
    if (_currentTab === 'pids') renderPids(data.watch_pids || []);
    updateStatusBanner(data);
  } catch (e) {}
}

function updateStatusBanner(data) {
  const running = data.monitor_running;
  $('offlineBanner').style.display = running ? 'none' : 'block';
  const badge = $('statusBadge');
  badge.textContent = running ? '● 运行中' : '● 未运行';
  badge.className = 'status-badge' + (running ? '' : ' offline');
}

function renderGpu(data) {
  const grid = $('gpuGrid');
  if (!data.gpus || !data.gpus.length) {
    grid.innerHTML = '<p style="color:#94a3b8;padding:16px;font-size:14px">暂无 GPU 数据</p>';
    return;
  }
  grid.innerHTML = data.gpus.map(gpu => {
    const pct = gpu.mem_total > 0 ? Math.round(gpu.mem_used / gpu.mem_total * 100) : 0;
    return `<div class="gpu-card" onclick="showGpuDetail(${gpu.index})">
      <div class="gpu-top">
        <div><span class="gpu-name">GPU ${gpu.index}</span><span class="gpu-model">${escHtml(gpu.name || '')}</span></div>
        <span class="gpu-pct" style="${memBadgeStyle(pct)}">${pct}%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${memBarGradient(pct)}"></div></div>
      <div class="gpu-meta">
        <span>${gpu.mem_used} / ${gpu.mem_total} MiB</span>
        <span>主PID: <b>${gpu.top_pid || '—'}</b></span>
      </div>
      <div class="gpu-cmd" title="${escHtml(gpu.top_cmd || '')}">${escHtml(gpu.top_cmd || '')}</div>
    </div>`;
  }).join('');
}

// ── GPU Detail ───────────────────────────────────────────

let _currentGpuIndex = null;

async function showGpuDetail(gpuIdx) {
  _currentGpuIndex = gpuIdx;
  $('gpuListView').style.display = 'none';
  $('gpuDetailView').style.display = 'block';
  $('gpuDetailTitle').textContent = `GPU ${gpuIdx}`;
  $('gpuDetailStats').innerHTML = '<span style="color:#94a3b8;font-size:13px">加载中…</span>';
  $('gpuDetailProcs').innerHTML = '';
  await _loadGpuDetail(gpuIdx);
}

async function refreshGpuDetail() {
  if (_currentGpuIndex === null) return;
  $('gpuDetailStats').innerHTML = '<span style="color:#94a3b8;font-size:13px">刷新中…</span>';
  $('gpuDetailProcs').innerHTML = '';
  await _loadGpuDetail(_currentGpuIndex);
}

async function _loadGpuDetail(gpuIdx) {
  try {
    const r = await api(`/api/gpu/${gpuIdx}/processes`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      $('gpuDetailStats').innerHTML = `<span style="color:#ef4444;font-size:13px">${escHtml(err.error || '获取失败')}</span>`;
      return;
    }
    const d = await r.json();
    $('gpuDetailTitle').textContent = `GPU ${gpuIdx}${d.gpu_name ? ' — ' + escHtml(d.gpu_name) : ''}`;

    const memPct = (d.mem_total > 0) ? Math.round(d.mem_used / d.mem_total * 100) : null;
    const stats = [];
    if (d.mem_used != null && d.mem_total != null) {
      stats.push({ label: '显存', value: `${d.mem_used} / ${d.mem_total} MiB${memPct != null ? ' (' + memPct + '%)' : ''}` });
    }
    if (d.util_pct != null) stats.push({ label: 'GPU 利用率', value: `${d.util_pct}%` });
    if (d.temp_c != null) stats.push({ label: '温度', value: `${d.temp_c}°C` });
    stats.push({ label: '进程数', value: `${d.processes.length}` });

    $('gpuDetailStats').innerHTML = stats.map(s =>
      `<div class="gpu-stat"><div class="gpu-stat-label">${s.label}</div><div class="gpu-stat-value">${s.value}</div></div>`
    ).join('');

    if (d.processes.length === 0) {
      $('gpuDetailProcs').innerHTML = '<div style="padding:16px;color:#94a3b8;font-size:14px">当前无 Compute 进程</div>';
    } else {
      const sorted = [...d.processes].sort((a, b) => b.mem_mib - a.mem_mib);
      $('gpuDetailProcs').innerHTML = `<div class="proc-table-wrap"><table class="proc-table">
        <thead><tr>
          <th>PID</th><th>显存 (MiB)</th><th>用户</th><th>启动时间</th><th>命令</th>
        </tr></thead>
        <tbody>${sorted.map(p => {
          const typeBadge = `<span style="font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;margin-left:5px;vertical-align:middle;${p.type==='C'?'background:#dbeafe;color:#2563eb':'background:#f1f5f9;color:#64748b'}">${escHtml(p.type||'?')}</span>`;
          return `<tr>
          <td data-label="PID" class="proc-pid-cell">${p.pid}${typeBadge}</td>
          <td data-label="显存" class="proc-mem-cell">${p.mem_mib} MiB</td>
          <td data-label="用户" style="white-space:nowrap;color:#475569">${escHtml(p.user || '—')}</td>
          <td data-label="启动" style="white-space:nowrap;color:#64748b;font-size:12px">${escHtml(fmtStartTime(p.start_time))}</td>
          <td data-label="命令" class="proc-cmd-cell">${escHtml(p.cmd || '—')}</td>
        </tr>`;}).join('')}</tbody>
      </table></div>`;
    }
  } catch (e) {
    $('gpuDetailStats').innerHTML = '<span style="color:#ef4444;font-size:13px">请求出错</span>';
  }
}

function showGpuList() {
  _currentGpuIndex = null;
  $('gpuDetailView').style.display = 'none';
  $('gpuListView').style.display = 'block';
}

// ── PIDs ─────────────────────────────────────────────────

function renderPids(pids) {
  $('pidCount').textContent = pids.length + ' 个';
  $('pidList').innerHTML = pids.length === 0
    ? '<div style="padding:16px;color:#94a3b8;font-size:14px">暂无监控 PID</div>'
    : pids.map(p => `<div class="pid-row">
        <div>
          <div class="pid-num">${p.pid}${p.note ? `<span style="font-size:12px;font-weight:400;color:#64748b;margin-left:8px">${escHtml(p.note)}</span>` : ''}</div>
          <div class="pid-cmd" title="${escHtml(p.cmd || '')}">${escHtml(p.cmd || '')}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="${p.alive ? 'badge-alive' : 'badge-dead'}">${p.alive ? '存活' : '已消失'}</span>
          <button class="del-btn" onclick="removePid(${p.pid})">×</button>
        </div>
      </div>`).join('');
}

async function loadPids() {
  const r = await api('/api/state');
  if (!r.ok) return;
  const data = await r.json();
  renderPids(data.watch_pids || []);
}

async function addPid() {
  const input = $('addPidInput');
  const noteInput = $('addNoteInput');
  const pid = parseInt(input.value);
  if (!pid || pid <= 0) {
    showMessage('pidMsg', 'PID 必须是正整数', 'error');
    return;
  }
  const note = noteInput.value.trim();
  const r = await api('/api/pids/add', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pid, note })
  });
  const payload = await r.json().catch(() => ({}));
  if (r.ok) {
    input.value = '';
    noteInput.value = '';
    showMessage('pidMsg', payload.warning || payload.message || 'PID 已保存', payload.warning ? 'warn' : 'success');
    loadPids();
    return;
  }
  showMessage('pidMsg', payload.error || '添加失败', 'error');
}

async function removePid(pid) {
  const r = await api('/api/pids/remove', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pid })
  });
  const payload = await r.json().catch(() => ({}));
  showMessage('pidMsg', payload.warning || payload.message || (r.ok ? 'PID 已移除' : '移除失败'), r.ok ? (payload.warning ? 'warn' : 'success') : 'error');
  loadPids();
}

// ── Settings ─────────────────────────────────────────────

async function loadSettings() {
  const r = await api('/api/config');
  if (!r.ok) return;
  const cfg = await r.json();
  $('cfgThreshold').value = cfg.mem_threshold_mib ?? 10240;
  $('cfgInterval').value  = cfg.check_interval ?? 5;
  $('cfgConfirm').value   = cfg.confirm_times ?? 2;
  $('cfgSendkey').value   = cfg.sendkey ?? '';
  $('cfgLogMb').value     = cfg.log_max_size_mb ?? 10;
  $('cfgLogKeep').value   = cfg.log_archive_keep ?? 5;
  $('cfgGpus').value      = (cfg.gpus || []).join(',');
}

async function saveSettings() {
  const msg = $('saveMsg');
  const parsePositive = (id, label) => {
    const value = parseInt($(id).value, 10);
    if (!Number.isInteger(value) || value <= 0) {
      throw new Error(label + '必须是正整数');
    }
    return value;
  };

  const gpusStr = $('cfgGpus').value.trim();
  const gpus = [];
  if (gpusStr) {
    const seen = new Set();
    for (const raw of gpusStr.split(',')) {
      const token = raw.trim();
      if (!token) continue;
      if (!/^\d+$/.test(token)) {
        showMessage('saveMsg', 'GPU 索引格式错误，请输入如 0,1,2', 'error');
        return;
      }
      const value = Number(token);
      if (seen.has(value)) {
        showMessage('saveMsg', 'GPU 索引不能重复', 'error');
        return;
      }
      seen.add(value);
      gpus.push(value);
    }
  }

  let body;
  try {
    body = {
      mem_threshold_mib: parsePositive('cfgThreshold', '显存告警阈值'),
      check_interval:    parsePositive('cfgInterval', '检测间隔'),
      confirm_times:     parsePositive('cfgConfirm', '确认次数'),
      sendkey:           $('cfgSendkey').value,
      log_max_size_mb:   parsePositive('cfgLogMb', '日志压缩触发大小'),
      log_archive_keep:  parsePositive('cfgLogKeep', '历史存档保留数量'),
      gpus,
    };
  } catch (err) {
    showMessage('saveMsg', err.message || '输入不合法', 'error');
    return;
  }

  const r = await api('/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const payload = await r.json().catch(() => ({}));
  if (r.ok) {
    showMessage('saveMsg', payload.warning || payload.message || '已保存', payload.warning ? 'warn' : 'success');
    setTimeout(() => { msg.style.display = 'none'; }, 2500);
  } else {
    showMessage('saveMsg', payload.error || '保存失败', 'error');
  }
}

function openPwdModal() {
  $('cfgCurPwd').value = '';
  $('cfgNewPwd').value = '';
  $('cfgConfirmPwd').value = '';
  $('pwdMsg').style.display = 'none';
  $('pwdModal').classList.add('open');
  setTimeout(() => $('cfgCurPwd').focus(), 50);
}

function closePwdModal() {
  $('pwdModal').classList.remove('open');
}

async function changePassword() {
  const cur = $('cfgCurPwd').value;
  const nw  = $('cfgNewPwd').value;
  const cf  = $('cfgConfirmPwd').value;
  const msg = $('pwdMsg');
  msg.style.color = '#ef4444';
  if (!cur || !nw) {
    msg.textContent = '请填写当前密码和新密码';
    msg.style.display = 'block';
    return;
  }
  if (nw !== cf) {
    msg.textContent = '两次输入的新密码不一致';
    msg.style.display = 'block';
    return;
  }
  const r = await api('/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ current_password: cur, new_password: nw })
  });
  const payload = await r.json().catch(() => ({}));
  if (r.ok) {
    msg.className = 'notice-msg success';
    msg.textContent = payload.message || '密码已修改';
    msg.style.display = 'block';
    setTimeout(() => closePwdModal(), 1200);
  } else {
    msg.className = 'notice-msg error';
    msg.textContent = payload.error || '修改失败';
    msg.style.display = 'block';
  }
}

// ── Log ──────────────────────────────────────────────────

async function loadLog() {
  const r = await api('/api/log');
  if (!r.ok) return;
  const entries = await r.json();
  $('logList').innerHTML = entries.length === 0
    ? '<div style="padding:16px;color:#94a3b8;font-size:14px">暂无日志</div>'
    : entries.map((e, i) => {
        const tagClass = TAG_CLASSES[e.type] || 'tag-info';
        const tagLabel = TAG_LABELS[e.type] || e.type;
        return `<div class="log-row" onclick="showLogDetail(${i})">
          <span class="log-tag ${tagClass}">${tagLabel}</span>
          <div class="log-main">
            <div class="log-title-text">${escHtml(e.title)}</div>
            <div class="log-time-text">${e.time}</div>
          </div>
          <div class="log-right">
            <span class="${e.send_success ? 'send-ok' : 'send-fail'}">${e.send_success ? '✓ 已发送' : '✗ 失败'}</span>
            <span class="chevron">›</span>
          </div>
        </div>`;
      }).join('');
  window._logEntries = entries;
}

async function loadArchives() {
  const r = await api('/api/log/archives');
  if (!r.ok) return;
  const archives = await r.json();
  $('archiveCount').textContent = archives.length + ' 个';
  $('archiveList').innerHTML = archives.length === 0
    ? '<div style="padding:16px;color:#94a3b8;font-size:14px">暂无存档</div>'
    : archives.map(a => {
        const kb = (a.size_bytes / 1024).toFixed(1);
        return `<div class="archive-row">
          <div>
            <div style="font-size:14px">${escHtml(a.filename)}</div>
            <div style="font-size:12px;color:#94a3b8">${kb} KB</div>
          </div>
          <a href="/api/log/archives/${encodeURIComponent(a.filename)}" download>
            <button class="dl-btn">下载</button>
          </a>
        </div>`;
      }).join('');
}

function showLogDetail(idx) {
  const e = (window._logEntries || [])[idx];
  if (!e) return;
  const tagClass = TAG_CLASSES[e.type] || 'tag-info';
  const tagLabel = TAG_LABELS[e.type] || e.type;
  $('detailTitle').textContent = e.title;
  $('detailTag').textContent = tagLabel;
  $('detailTag').className = 'log-tag ' + tagClass;
  $('detailTime').textContent = e.time;
  $('detailSendkey').textContent = 'Server Chan · ' + (e.sendkey_hint || '');
  const statusEl = $('detailStatus');
  if (e.send_success) {
    statusEl.innerHTML = `<span class="meta-ok">✓ 成功（HTTP ${e.http_status}）</span>`;
  } else {
    statusEl.innerHTML = `<span class="meta-fail">✗ 失败（HTTP ${e.http_status}）</span>`;
  }
  $('detailContent').textContent = e.content;
  $('logListView').style.display = 'none';
  $('logDetailView').style.display = 'block';
}

function showLogList() {
  $('logDetailView').style.display = 'none';
  $('logListView').style.display = 'block';
}

// ── Util ─────────────────────────────────────────────────

// "Mon Apr 13 10:07:46 2026" → "Apr 13 10:07"
function fmtStartTime(s) {
  if (!s) return '—';
  const p = s.trim().split(/\s+/);
  // [weekday, month, day, time, year]
  if (p.length >= 5) return `${p[1]} ${p[2]} ${p[3].slice(0, 5)}`;
  return s;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function memBarGradient(pct) {
  if (pct >= 80) return 'linear-gradient(90deg,#ef4444,#f87171)';
  if (pct >= 60) return 'linear-gradient(90deg,#f59e0b,#fbbf24)';
  return 'linear-gradient(90deg,#22c55e,#4ade80)';
}

function memBadgeStyle(pct) {
  if (pct >= 80) return 'background:#fee2e2;color:#ef4444';
  if (pct >= 60) return 'background:#fef3c7;color:#d97706';
  return 'background:#dcfce7;color:#16a34a';
}
