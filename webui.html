<!DOCTYPE html>
<html lang="zh" data-theme="light" data-glass="off">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sserveros</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; font-size: 15px; }
[v-cloak] { display: none !important; }

/* Login */
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 32px; width: 100%; max-width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin: 16px; }
.login-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.login-sub { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
.login-input { width: 100%; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 14px; font-size: 15px; outline: none; margin-bottom: 12px; }
.login-input:focus { border-color: #2563eb; }
.login-btn { width: 100%; background: #2563eb; color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; }
.login-error { color: #ef4444; font-size: 13px; margin-top: 10px; }

/* App shell */
.offline-banner { background: #fee2e2; color: #b91c1c; padding: 10px 16px; font-size: 13px; font-weight: 500; text-align: center; }
.header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
.header-title { font-weight: 700; font-size: 17px; }
.header-host { font-size: 12px; color: #94a3b8; margin-top: 1px; }
.status-badge { background: #dcfce7; color: #16a34a; font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 500; }
.status-badge.offline { background: #fee2e2; color: #ef4444; }
.logout-btn { font-size: 12px; color: #94a3b8; background: none; border: 1px solid #e2e8f0; border-radius: 8px; padding: 5px 12px; cursor: pointer; margin-left: 10px; }
.pwd-btn { font-size: 12px; color: #64748b; background: none; border: 1px solid #e2e8f0; border-radius: 8px; padding: 5px 10px; cursor: pointer; margin-left: 4px; }
.menu-btn { font-size: 16px; color: #64748b; background: none; border: 1px solid #e2e8f0; border-radius: 8px; padding: 5px 10px; cursor: pointer; margin-left: 4px; line-height: 1.2; }
.dropdown { position: relative; display: inline-block; }
.dropdown-menu { display: none; position: absolute; right: 0; top: calc(100% + 6px); background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); min-width: 152px; z-index: 50; overflow: hidden; }
.dropdown-menu.open { display: block; }
.dropdown-item { display: block; width: 100%; padding: 11px 16px; font-size: 14px; color: #1e293b; background: none; border: none; border-bottom: 1px solid #f1f5f9; cursor: pointer; text-align: left; transition: background .1s; white-space: nowrap; }
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover { background: #f8fafc; }
.dropdown-item.danger { color: #ef4444; }
.dropdown-section { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
.dropdown-section-label { font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
.dropdown-segment { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.dropdown-segment-btn { border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; color: #64748b; font-size: 12px; padding: 7px 8px; cursor: pointer; }
.dropdown-segment-btn.active { background: #dbeafe; border-color: #93c5fd; color: #2563eb; font-weight: 600; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 14px; z-index: 300; opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 340px; margin: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.modal-title { font-weight: 700; font-size: 16px; margin-bottom: 18px; }
.modal-input { width: 100%; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 14px; font-size: 14px; outline: none; margin-bottom: 10px; }
.modal-input:focus { border-color: #2563eb; }
.modal-actions { display: flex; gap: 8px; margin-top: 4px; }
.modal-submit { flex: 1; background: #2563eb; color: #fff; border: none; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; }
.modal-cancel { background: none; color: #64748b; border: 1px solid #e2e8f0; border-radius: 10px; padding: 11px 16px; font-size: 14px; cursor: pointer; }
.modal-msg { font-size: 13px; margin-top: 8px; }

/* Tabs */
.tabs { background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; overflow-x: auto; }
.tab { flex: 1; min-width: 70px; padding: 14px 8px; text-align: center; font-size: 14px; color: #94a3b8; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; }
.tab.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }

/* Panes */
.pane { padding: 16px; max-width: 900px; margin: 0 auto; display: none; flex-direction: column; gap: 14px; }
.pane.active { display: flex; }

/* Generic card */
.card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.card-header { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }

/* Sysinfo */
.sysinfo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
@media (max-width: 560px) { .sysinfo-grid { grid-template-columns: 1fr; } }
.sysinfo-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.sysinfo-card-link { cursor: pointer; transition: border-color .15s, box-shadow .15s; }
.sysinfo-card-link:hover { border-color: #2563eb; box-shadow: 0 2px 10px rgba(37,99,235,0.12); }
.sysinfo-label { font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
.sysinfo-value { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 10px; line-height: 1.2; }
.sysinfo-sub { font-size: 12px; color: #64748b; margin-top: 5px; }
.sysinfo-section-title { font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; padding: 4px 0 2px; }

/* GPU */
.gpu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.gpu-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); cursor: pointer; transition: border-color .15s, box-shadow .15s; }
.gpu-card:hover { border-color: #2563eb; box-shadow: 0 2px 10px rgba(37,99,235,0.12); }
.gpu-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.gpu-name { font-weight: 700; font-size: 16px; }
.gpu-model { font-size: 12px; color: #94a3b8; margin-left: 6px; }
.gpu-pct { background: #dbeafe; color: #2563eb; font-size: 12px; padding: 3px 9px; border-radius: 12px; font-weight: 600; }
.bar-bg { background: #e2e8f0; border-radius: 4px; height: 8px; margin-bottom: 8px; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s, background 0.4s; }
.gpu-meta { display: flex; justify-content: space-between; font-size: 13px; color: #64748b; }
.gpu-cmd { font-size: 12px; color: #94a3b8; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.refresh-hint { text-align: center; font-size: 12px; color: #cbd5e1; }
.app-footer { max-width: 900px; margin: 0 auto; padding: 0 16px 24px; }
.app-footer-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px 16px; font-size: 13px; line-height: 1.7; color: #64748b; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.app-footer-card a { color: #2563eb; font-weight: 600; text-decoration: none; }
.app-footer-card a:hover { text-decoration: underline; }

/* GPU detail */
.gpu-stat-row { display: flex; gap: 16px; flex-wrap: wrap; padding: 14px 16px; border-bottom: 1px solid #f1f5f9; }
.gpu-stat { display: flex; flex-direction: column; gap: 2px; }
.gpu-stat-label { font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
.gpu-stat-value { font-size: 16px; font-weight: 700; color: #1e293b; }
.proc-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.proc-table { width: 100%; border-collapse: collapse; }
.proc-table th { text-align: left; font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; padding: 10px 16px 6px; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
.proc-table td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid #f8fafc; vertical-align: top; }
.proc-table tr:last-child td { border-bottom: none; }
.proc-pid-cell { font-weight: 600; color: #1e293b; white-space: nowrap; }
.proc-mem-cell { white-space: nowrap; color: #2563eb; font-weight: 500; }
.proc-cmd-cell { color: #475569; font-family: monospace; font-size: 12px; word-break: break-all; max-width: 400px; }
.proc-action-cell { white-space: nowrap; text-align: right; }
.proc-add-btn { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer; }
.proc-add-btn:hover { background: #1d4ed8; }
.proc-add-btn:disabled { background: #f1f5f9; color: #94a3b8; cursor: not-allowed; }
.proc-watched { display: inline-flex; align-items: center; background: #dcfce7; color: #16a34a; border-radius: 8px; padding: 4px 8px; font-size: 11px; font-weight: 600; }
@media (max-width: 639px) {
  .proc-table thead { display: none; }
  .proc-table, .proc-table tbody, .proc-table tr, .proc-table td { display: block; width: 100%; }
  .proc-table tr { border-bottom: 1px solid #e2e8f0; padding: 10px 0; }
  .proc-table tr:last-child { border-bottom: none; }
  .proc-table td { border: none; padding: 3px 16px; display: flex; gap: 10px; align-items: baseline; font-size: 13px; }
  .proc-table td::before { content: attr(data-label); font-size: 10px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; min-width: 48px; flex-shrink: 0; }
  .proc-cmd-cell { word-break: break-all; font-size: 12px; }
  .proc-table td.proc-cmd-cell { align-items: flex-start; }
  .proc-action-cell { text-align: left; }
}

/* PIDs */
.pid-row { padding: 14px 16px; border-bottom: 1px solid #f8fafc; display: flex; justify-content: space-between; align-items: center; }
.pid-row:last-child { border-bottom: none; }
.pid-num { font-size: 15px; font-weight: 600; }
.pid-cmd { font-size: 12px; color: #94a3b8; margin-top: 2px; max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.badge-alive { background: #dcfce7; color: #16a34a; font-size: 11px; padding: 3px 8px; border-radius: 10px; }
.badge-dead { background: #fee2e2; color: #ef4444; font-size: 11px; padding: 3px 8px; border-radius: 10px; }
.del-btn { background: none; border: none; color: #ef4444; font-size: 20px; cursor: pointer; padding: 4px 8px; line-height: 1; }
.add-row { display: flex; gap: 10px; padding: 14px 16px; flex-wrap: wrap; }
.add-input { flex: 1; min-width: 0; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 14px; font-size: 14px; outline: none; }
.add-input:focus { border-color: #2563eb; }
.add-btn { background: #2563eb; color: #fff; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
@media (max-width: 480px) {
  .add-row { flex-direction: column; gap: 8px; }
  .add-row .add-input { width: 100%; max-width: none !important; }
  .add-btn { width: 100%; padding: 12px; }
}

/* Settings */
.setting-row { padding: 14px 16px; border-bottom: 1px solid #f8fafc; }
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 12px; color: #64748b; margin-bottom: 6px; }
.setting-input { width: 100%; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 14px; font-size: 14px; outline: none; }
.setting-input:focus { border-color: #2563eb; }
.setting-row-toggle { display: flex; justify-content: space-between; align-items: center; }
.toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #e2e8f0; border-radius: 24px; cursor: pointer; transition: background .2s; }
.toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
.toggle-switch input:checked + .toggle-slider { background: #2563eb; }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
.save-btn { background: #2563eb; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; box-shadow: 0 2px 8px rgba(37,99,235,0.3); }
.bark-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.bark-row .bark-url { flex: 2; }
.bark-row .bark-key { flex: 1; }
.bark-row .bark-del { background: none; border: none; color: #ef4444; font-size: 18px; cursor: pointer; padding: 4px 6px; line-height: 1; flex-shrink: 0; }
.add-channel-btn { background: none; border: 1px dashed #cbd5e1; border-radius: 8px; color: #64748b; font-size: 13px; padding: 7px 14px; cursor: pointer; margin-top: 4px; width: 100%; text-align: left; }
.add-channel-btn:hover { border-color: #2563eb; color: #2563eb; }
.env-channel-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.env-channel-item { border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 12px; background: #f8fafc; font-size: 13px; color: #334155; }
.notice-msg { font-size: 13px; margin-top: 10px; text-align: center; }
.notice-msg.success { color: #16a34a; }
.notice-msg.warn { color: #d97706; }
.notice-msg.error { color: #ef4444; }

/* Log list */
.log-row { padding: 12px 16px; border-bottom: 1px solid #f8fafc; display: flex; gap: 10px; align-items: flex-start; cursor: pointer; transition: background .1s; }
.log-row:hover { background: #f8fafc; }
.log-row:last-child { border-bottom: none; }
.log-tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; white-space: nowrap; margin-top: 2px; font-weight: 500; flex-shrink: 0; }
.tag-warn { background: #fee2e2; color: #ef4444; }
.tag-found { background: #dbeafe; color: #2563eb; }
.tag-recover { background: #dcfce7; color: #16a34a; }
.tag-pid { background: #fef3c7; color: #d97706; }
.tag-info { background: #f1f5f9; color: #64748b; }
.tag-admin-stop { background: #fee2e2; color: #b91c1c; }
.tag-stop { background: #ffedd5; color: #c2410c; }
.tag-crash { background: #fecaca; color: #991b1b; }
.log-main { flex: 1; min-width: 0; }
.log-title-text { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.log-time-text { font-size: 12px; color: #94a3b8; margin-top: 2px; }
.log-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.send-ok { font-size: 11px; color: #16a34a; }
.send-fail { font-size: 11px; color: #ef4444; }
.chevron { color: #cbd5e1; font-size: 16px; }

/* Log detail */
.detail-header { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 10px; }
.back-btn { background: none; border: 1px solid #e2e8f0; border-radius: 8px; padding: 5px 12px; font-size: 13px; cursor: pointer; color: #64748b; white-space: nowrap; }
.detail-title-text { font-weight: 600; font-size: 14px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
@media (max-width: 480px) {
  #gpuDetailView .detail-header { flex-wrap: wrap; padding-bottom: 10px; }
  #gpuDetailTitle { flex-basis: 100%; white-space: normal; word-break: break-word; overflow: visible; text-overflow: unset; font-size: 13px; }
}
.detail-meta { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; display: flex; flex-direction: column; gap: 10px; }
.meta-row { display: flex; gap: 10px; font-size: 13px; }
.meta-label { color: #94a3b8; width: 64px; flex-shrink: 0; }
.meta-value { color: #1e293b; font-weight: 500; }
.meta-ok { color: #16a34a; font-weight: 600; }
.meta-fail { color: #ef4444; font-weight: 600; }
.detail-body { padding: 14px 16px; }
.detail-body-label { font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.detail-body-content { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; font-size: 13px; color: #334155; line-height: 1.6; white-space: pre; font-family: monospace; max-height: 50vh; overflow-x: auto; overflow-y: auto; }

/* Agent */
#paneAgent { padding: 0 !important; gap: 0 !important; overflow: hidden; }
#paneAgent.active { display: flex; flex-direction: column; }
@media (min-width: 640px) {
  #paneAgent { padding: 12px !important; max-width: 900px; margin: 0 auto; width: 100%; }
  .agent-layout { border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
}
.agent-layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; min-height: 0; }
.agent-messages { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; min-height: 0; }
.agent-empty { flex: 1; min-height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #94a3b8; padding: 24px 12px; }
.agent-empty-title { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
.agent-empty-sub { font-size: 13px; line-height: 1.6; max-width: 420px; }
.msg-user { align-self: flex-end; background: #2563eb; color: #fff; border-radius: 14px 14px 4px 14px; padding: 10px 14px; max-width: 82%; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg-assistant { align-self: flex-start; background: #f1f5f9; color: #1e293b; border-radius: 4px 14px 14px 14px; padding: 10px 14px; max-width: 92%; font-size: 14px; line-height: 1.6; word-break: break-word; }
.msg-error { align-self: flex-start; background: #fee2e2; color: #b91c1c; border-radius: 4px 14px 14px 14px; padding: 10px 14px; max-width: 92%; font-size: 13px; }
.msg-thinking { display: flex; align-items: center; gap: 8px; color: #94a3b8; font-size: 13px; }
.thinking-dots { display: flex; gap: 4px; }
.thinking-dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #cbd5e1; animation: tdot 1.2s infinite; }
.thinking-dots span:nth-child(2) { animation-delay: .2s; }
.thinking-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes tdot { 0%,80%,100%{transform:scale(.7);opacity:.4} 40%{transform:scale(1);opacity:1} }
.tool-trace { margin-top: 8px; border-top: 1px solid #e2e8f0; padding-top: 6px; display: flex; flex-direction: column; gap: 4px; }
.tool-trace-toggle { font-size: 11px; color: #94a3b8; cursor: pointer; user-select: none; }
.tool-trace-toggle:hover { color: #2563eb; }
.tool-step { font-size: 12px; color: #64748b; padding: 3px 0 3px 10px; border-left: 2px solid #e2e8f0; font-family: monospace; word-break: break-all; }
.tool-step.ok { border-left-color: #86efac; }
.tool-step.fail { border-left-color: #fca5a5; color: #ef4444; }
.pending-card { background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; padding: 12px 14px; font-size: 13px; margin-top: 8px; }
.pending-card-title { font-weight: 600; color: #92400e; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: .4px; }
.pending-action-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #fef3c7; }
.pending-action-item:last-child { border-bottom: none; }
.pending-action-label { flex: 1; font-size: 13px; color: #1e293b; }
.pending-action-label code { background: #f1f5f9; border-radius: 4px; padding: 1px 5px; font-size: 12px; font-family: monospace; }
.pending-action-badge { font-size: 11px; padding: 2px 7px; border-radius: 8px; background: #dbeafe; color: #2563eb; font-weight: 500; white-space: nowrap; }
.pending-actions-bar { display: flex; gap: 8px; margin-top: 10px; }
.confirm-btn { flex: 1; background: #16a34a; color: #fff; border: none; border-radius: 8px; padding: 9px; font-size: 13px; font-weight: 600; cursor: pointer; }
.reject-btn { background: none; color: #ef4444; border: 1px solid #fecaca; border-radius: 8px; padding: 9px 14px; font-size: 13px; cursor: pointer; }
.agent-bottom { border-top: 1px solid #e2e8f0; background: #fff; flex-shrink: 0; }
.agent-toolbar { display: flex; align-items: center; gap: 6px; padding: 7px 12px 0; }
.agent-tool-btn { background: none; border: 1px solid #e2e8f0; border-radius: 7px; color: #64748b; font-size: 12px; padding: 4px 10px; cursor: pointer; white-space: nowrap; line-height: 1.6; }
.agent-tool-btn:hover { border-color: #2563eb; color: #2563eb; }
.agent-input-row { display: flex; gap: 8px; padding: 8px 12px 10px; align-items: flex-end; }
.agent-input-wrap { position: relative; flex: 1; min-width: 0; display: flex; }
.agent-input { width: 100%; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 32px 10px 14px; font-size: 14px; outline: none; resize: none; min-height: 42px; max-height: 45vh; overflow-y: auto; font-family: inherit; line-height: 1.5; }
.agent-input:focus { border-color: #2563eb; }
.agent-input-resize { position: absolute; top: 3px; right: 3px; width: 24px; height: 22px; border: none; border-radius: 8px; background: transparent; cursor: ns-resize; touch-action: none; }
.agent-input-resize::before { content: ''; position: absolute; top: 5px; right: 5px; width: 12px; height: 12px; background: repeating-linear-gradient(45deg, transparent 0 3px, #94a3b8 3px 4px); opacity: .9; }
.agent-input-resize:hover { background: #f1f5f9; }
.agent-input-resize:hover::before { background: repeating-linear-gradient(45deg, transparent 0 3px, #2563eb 3px 4px); }
.agent-send-btn { background: #2563eb; color: #fff; border: none; border-radius: 10px; padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; height: 42px; }
.agent-interrupt-btn { background: #ef4444; color: #fff; border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; height: 42px; }
@media (max-width: 480px) {
  .agent-toolbar { padding: 6px 8px 0; }
  .agent-input-row { padding: 6px 8px 8px; gap: 6px; }
  .agent-send-btn, .agent-interrupt-btn { padding: 10px 12px; font-size: 13px; }
  .msg-user, .msg-assistant, .msg-error { max-width: 95%; }
}
.agent-disabled-notice { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 14px; }
.agent-disabled-notice a { color: #2563eb; cursor: pointer; text-decoration: underline; }
.streaming-cursor { display: inline-block; width: 2px; height: 14px; background: #2563eb; margin-left: 2px; vertical-align: text-bottom; animation: blink-cursor 1s step-end infinite; }
@keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }

/* Archive */
.archive-row { padding: 12px 16px; border-bottom: 1px solid #f8fafc; display: flex; justify-content: space-between; align-items: center; }
.archive-row:last-child { border-bottom: none; }
.dl-btn { font-size: 12px; color: #2563eb; background: none; border: 1px solid #dbeafe; border-radius: 8px; padding: 5px 12px; cursor: pointer; }

/* Markdown inside agent messages */
.md-body { white-space: normal; }
.md-body > *:first-child { margin-top: 0; }
.md-body > *:last-child { margin-bottom: 0; }
.md-body h1,.md-body h2,.md-body h3,.md-body h4 { font-weight: 600; margin: 10px 0 4px; line-height: 1.3; }
.md-body h1 { font-size: 16px; }
.md-body h2 { font-size: 15px; }
.md-body h3,.md-body h4 { font-size: 14px; }
.md-body p { margin: 4px 0; }
.md-body ul,.md-body ol { padding-left: 18px; margin: 4px 0; }
.md-body li { margin: 2px 0; }
.md-body code { background: rgba(0,0,0,0.07); border-radius: 4px; padding: 1px 5px; font-family: monospace; font-size: 12px; }
.md-body pre { background: rgba(0,0,0,0.06); border-radius: 8px; padding: 10px 12px; overflow-x: auto; margin: 6px 0; }
.md-body pre code { background: none; padding: 0; }
.md-body blockquote { border-left: 3px solid #2563eb; padding-left: 10px; margin: 4px 0; color: #64748b; font-style: italic; }
.md-body table { border-collapse: collapse; width: 100%; margin: 6px 0; font-size: 13px; }
.md-body th,.md-body td { border: 1px solid #e2e8f0; padding: 6px 10px; text-align: left; }
.md-body th { background: #f8fafc; font-weight: 600; }
.md-body a { color: #2563eb; text-decoration: underline; }
.md-body strong { font-weight: 600; }
.md-body em { font-style: italic; }
.md-body hr { border: none; border-top: 1px solid #e2e8f0; margin: 8px 0; }

/* v1 visual system */
:root,
[data-theme="light"] {
  --bg-0: oklch(99% 0.002 260);
  --bg-1: oklch(100% 0 0);
  --bg-2: oklch(96.5% 0.005 260);
  --bg-3: oklch(93% 0.008 260);
  --bg-4: oklch(88% 0.010 260);
  --fg-1: oklch(20% 0.018 260);
  --fg-2: oklch(38% 0.014 260);
  --fg-3: oklch(56% 0.012 260);
  --fg-4: oklch(72% 0.008 260);
  --border-subtle: oklch(94% 0.006 260);
  --border-default: oklch(89% 0.010 260);
  --border-strong: oklch(74% 0.014 260);
  --accent: oklch(54% 0.21 280);
  --accent-fg: oklch(99% 0.005 280);
  --accent-bg: oklch(95% 0.04 280);
  --accent-ring: oklch(54% 0.21 280 / 0.35);
  --ok-fg: oklch(48% 0.16 150);
  --ok-bg: oklch(94% 0.05 150);
  --warn-fg: oklch(56% 0.16 75);
  --warn-bg: oklch(95% 0.06 75);
  --danger-fg: oklch(54% 0.22 25);
  --danger-bg: oklch(95% 0.06 25);
  --info-fg: oklch(50% 0.14 220);
  --info-bg: oklch(94% 0.05 220);
  --gradient-mem: linear-gradient(90deg, var(--ok-fg) 0%, var(--ok-fg) 60%, var(--warn-fg) 78%, var(--danger-fg) 100%);
  --shadow-sm: 0 1px 2px rgba(15,18,24,.06);
  --shadow-md: 0 2px 10px rgba(15,18,24,.08);
  --shadow-lg: 0 12px 40px rgba(15,18,24,.18);
  --radius-xs: 4px;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 10px;
  --radius-xl: 16px;
  --radius-pill: 999px;
  --font-sans: Inter, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
[data-theme="dark"] {
  --bg-0: oklch(16% 0.012 260);
  --bg-1: oklch(20% 0.014 260);
  --bg-2: oklch(24% 0.016 260);
  --bg-3: oklch(28% 0.018 260);
  --bg-4: oklch(34% 0.020 260);
  --fg-1: oklch(96% 0.005 90);
  --fg-2: oklch(78% 0.008 90);
  --fg-3: oklch(60% 0.010 260);
  --fg-4: oklch(45% 0.010 260);
  --border-subtle: oklch(28% 0.014 260);
  --border-default: oklch(34% 0.016 260);
  --border-strong: oklch(46% 0.018 260);
  --accent: oklch(68% 0.20 280);
  --accent-fg: oklch(96% 0.02 280);
  --accent-bg: oklch(28% 0.06 280);
  --accent-ring: oklch(68% 0.20 280 / 0.4);
  --ok-fg: oklch(78% 0.18 150);
  --ok-bg: oklch(28% 0.07 150);
  --warn-fg: oklch(82% 0.16 75);
  --warn-bg: oklch(30% 0.07 75);
  --danger-fg: oklch(72% 0.20 25);
  --danger-bg: oklch(30% 0.10 25);
  --info-fg: oklch(80% 0.13 220);
  --info-bg: oklch(28% 0.06 220);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.32);
  --shadow-md: 0 2px 10px rgba(0,0,0,.36);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.48);
}
html { background: var(--bg-0); }
body { font-family: var(--font-sans); background: var(--bg-0); color: var(--fg-1); -webkit-font-smoothing: antialiased; }
body, .header, .tabs, .card, .sysinfo-card, .gpu-card, .login-card, .modal-box, .dropdown-menu, .agent-layout, .agent-bottom, .app-footer-card {
  transition: background .2s ease, border-color .2s ease, color .2s ease, box-shadow .2s ease;
}
.login-card, .card, .sysinfo-card, .gpu-card, .app-footer-card, .agent-layout {
  background: var(--bg-1);
  border-color: var(--border-default);
  border-radius: var(--radius-lg);
  box-shadow: none;
}
.header {
  height: 48px;
  background: color-mix(in oklab, var(--bg-0) 86%, transparent);
  border-bottom-color: var(--border-subtle);
  backdrop-filter: blur(8px) saturate(140%);
  -webkit-backdrop-filter: blur(8px) saturate(140%);
}
.header-title { font-family: var(--font-mono); font-size: 16px; font-weight: 500; color: var(--fg-1); }
.header-host, .login-sub, .sysinfo-sub, .gpu-model, .gpu-cmd, .refresh-hint, .log-time-text, .pid-cmd { color: var(--fg-3); }
.tabs { height: 38px; background: var(--bg-0); border-bottom-color: var(--border-subtle); padding: 0 20px; gap: 20px; justify-content: center; }
.tab { flex: 0 0 auto; min-width: 0; padding: 10px 4px 8px; color: var(--fg-3); border-bottom-width: 2px; font-size: 13px; }
.tab.active { color: var(--fg-1); border-bottom-color: var(--accent); font-weight: 500; }
.pane { max-width: 1180px; gap: 10px; padding: 14px 20px 24px; }
@media (max-width: 560px) {
  .tabs { justify-content: flex-start; }
}
.card-header, .detail-header, .detail-meta, .gpu-stat-row, .agent-bottom { border-color: var(--border-subtle); }
.sysinfo-label, .sysinfo-section-title, .gpu-stat-label, .detail-body-label, .setting-label, .proc-table th {
  color: var(--fg-3);
  letter-spacing: .06em;
}
.sysinfo-value, .gpu-name, .gpu-stat-value, .proc-pid-cell, .pid-num, .log-title-text, .detail-title-text, .meta-value { color: var(--fg-1); }
.gpu-card:hover, .sysinfo-card-link:hover { border-color: var(--border-strong); background: var(--bg-2); box-shadow: none; }
.bar-bg { background: var(--bg-3); height: 6px; }
.bar-fill { background: var(--ok-fg); }
.gpu-pct, .status-badge, .log-tag, .badge-alive, .badge-dead, .proc-watched { border-radius: var(--radius-pill); }
.login-input, .modal-input, .add-input, .setting-input, .agent-input, .dropdown-segment-btn {
  background: var(--bg-2);
  border-color: var(--border-default);
  color: var(--fg-1);
}
.login-input:focus, .modal-input:focus, .add-input:focus, .setting-input:focus, .agent-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-ring);
}
.login-btn, .add-btn, .save-btn, .modal-submit, .agent-send-btn, .proc-add-btn {
  background: var(--accent);
  color: var(--accent-fg);
  box-shadow: none;
}
.login-btn:hover, .add-btn:hover, .modal-submit:hover, .agent-send-btn:hover, .proc-add-btn:hover { filter: brightness(.96); }
.back-btn, .pwd-btn, .logout-btn, .menu-btn, .agent-tool-btn, .dl-btn, .modal-cancel {
  background: transparent;
  border-color: var(--border-default);
  color: var(--fg-2);
}
.dropdown-menu, .modal-box { background: var(--bg-1); border-color: var(--border-default); box-shadow: var(--shadow-lg); }
.dropdown-item, .dropdown-segment-btn { color: var(--fg-1); border-color: var(--border-subtle); }
.dropdown-item:hover, .dropdown-segment-btn:hover { background: var(--bg-3); }
.dropdown-section { border-color: var(--border-subtle); }
.dropdown-segment-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
.proc-table td, .pid-row, .log-row, .archive-row, .setting-row { border-color: var(--border-subtle); }
.proc-cmd-cell, .meta-row, .detail-body-content, .msg-assistant, .agent-empty-sub { color: var(--fg-2); }
.agent-empty-title { color: var(--fg-1); }
.detail-body-content, .msg-assistant, .tool-step { background: var(--bg-2); border-color: var(--border-default); }
.msg-user { background: var(--accent); color: var(--accent-fg); }
.offline-banner { background: var(--danger-bg); color: var(--danger-fg); }
.status-badge { background: var(--ok-bg); color: var(--ok-fg); }
.status-badge.offline { background: var(--danger-bg); color: var(--danger-fg); }
.app-footer-card a, .dl-btn { color: var(--accent); }
[data-glass="on"] {
  background:
    radial-gradient(900px 600px at 8% -8%, oklch(82% 0.15 280 / .55), transparent 60%),
    radial-gradient(800px 600px at 100% 12%, oklch(86% 0.13 200 / .50), transparent 62%),
    radial-gradient(700px 500px at 30% 110%, oklch(88% 0.13 110 / .45), transparent 60%),
    radial-gradient(900px 700px at 95% 100%, oklch(86% 0.14 30 / .45), transparent 60%),
    var(--bg-0);
  background-attachment: fixed;
}
[data-glass="on"][data-theme="dark"] {
  background:
    radial-gradient(900px 600px at 8% -8%, oklch(40% 0.18 280 / .65), transparent 60%),
    radial-gradient(800px 600px at 100% 12%, oklch(38% 0.14 200 / .60), transparent 62%),
    radial-gradient(700px 500px at 30% 110%, oklch(42% 0.16 110 / .55), transparent 60%),
    radial-gradient(900px 700px at 95% 100%, oklch(40% 0.16 30 / .55), transparent 60%),
    var(--bg-0);
  background-attachment: fixed;
}
[data-glass="on"] body { background: transparent; }
[data-glass="on"] .header, [data-glass="on"] .tabs {
  background: color-mix(in oklab, var(--bg-0) 38%, transparent);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
}
[data-glass="on"] .login-card, [data-glass="on"] .card, [data-glass="on"] .sysinfo-card, [data-glass="on"] .gpu-card, [data-glass="on"] .app-footer-card, [data-glass="on"] .agent-layout, [data-glass="on"] .modal-box, [data-glass="on"] .dropdown-menu {
  background: color-mix(in oklab, var(--bg-1) 58%, transparent);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-color: color-mix(in oklab, var(--fg-1) 12%, transparent);
  box-shadow: inset 0 1px 0 color-mix(in oklab, white 42%, transparent), 0 8px 32px color-mix(in oklab, black 10%, transparent);
}
[data-glass="on"] .login-input, [data-glass="on"] .modal-input, [data-glass="on"] .add-input, [data-glass="on"] .setting-input, [data-glass="on"] .agent-input, [data-glass="on"] .dropdown-segment-btn {
  background: color-mix(in oklab, var(--bg-1) 55%, transparent);
  backdrop-filter: blur(12px) saturate(160%);
  -webkit-backdrop-filter: blur(12px) saturate(160%);
}
</style>

<body>
<div id="app">

<!-- ── Login ─────────────────────────────────────── -->
<div class="login-wrap" v-if="!isLoggedIn">
  <div class="login-card">
    <div class="login-title">sserveros</div>
    <div class="login-sub">请输入访问密码</div>
    <input class="login-input" type="password" v-model="loginPwd" placeholder="密码"
           @keydown.enter="doLogin">
    <button class="login-btn" @click="doLogin">登录</button>
    <div class="login-error" v-if="loginError" v-cloak>密码错误，请重试</div>
  </div>
</div>

<!-- ── App ───────────────────────────────────────── -->
<template v-else>
  <div class="offline-banner" v-if="!monitorRunning">⚠ 监控脚本未运行</div>

  <div class="header">
    <div>
      <div class="header-title">sserveros</div>
      <div class="header-host">机器: {{ hostname }}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="status-badge" :class="{offline: !monitorRunning}">
        {{ monitorRunning ? '● 运行中' : '● 未运行' }}
      </span>
      <div class="dropdown" ref="headerDropdown">
        <button class="menu-btn" @click="dropdownOpen = !dropdownOpen" title="操作菜单">⚙</button>
        <div class="dropdown-menu" :class="{open: dropdownOpen}">
          <div class="dropdown-section">
            <div class="dropdown-section-label">明暗</div>
            <div class="dropdown-segment">
              <button class="dropdown-segment-btn" :class="{active: uiTheme === 'light'}" @click="setUiTheme('light')">Light</button>
              <button class="dropdown-segment-btn" :class="{active: uiTheme === 'dark'}" @click="setUiTheme('dark')">Dark</button>
            </div>
          </div>
          <div class="dropdown-section">
            <div class="dropdown-section-label">风格</div>
            <div class="dropdown-segment">
              <button class="dropdown-segment-btn" :class="{active: uiSurface === 'solid'}" @click="setUiSurface('solid')">Solid</button>
              <button class="dropdown-segment-btn" :class="{active: uiSurface === 'glass'}" @click="setUiSurface('glass')">Glass</button>
            </div>
          </div>
          <button class="dropdown-item" @click="dropdownOpen=false; pwdModalOpen=true">🔑 修改密码</button>
          <button class="dropdown-item" @click="dropdownOpen=false; sendTestNotify()">🔔 测试通知</button>
          <button class="dropdown-item danger" @click="dropdownOpen=false; doLogout()">退出登录</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <div v-for="t in tabs" :key="t.id" class="tab" :class="{active: currentTab === t.id}"
         @click="switchTab(t.id)">{{ t.label }}</div>
  </div>

  <!-- ── GPU pane ── -->
  <div class="pane" :class="{active: currentTab === 'gpu'}" id="paneGpu">
    <!-- GPU list -->
    <template v-if="gpuView === 'list'">
      <div class="sysinfo-grid">
        <div class="sysinfo-card">
          <div class="sysinfo-label">CPU</div>
          <div class="sysinfo-value">{{ cpuPct != null ? cpuPct.toFixed(1) + '%' : '—' }}</div>
          <div class="bar-bg"><div class="bar-fill" :style="{width: (cpuPct||0)+'%', background: barColor(cpuPct||0)}"></div></div>
        </div>
        <div class="sysinfo-card">
          <div class="sysinfo-label">内存</div>
          <div class="sysinfo-value">{{ ramDisplay }}</div>
          <div class="bar-bg"><div class="bar-fill" :style="{width: ramPct+'%', background: barColor(ramPct)}"></div></div>
          <div class="sysinfo-sub">{{ ramTotalMib ? ramPct + '%' : '' }}</div>
        </div>
        <div class="sysinfo-card sysinfo-card-link" @click="showDiskDetail()">
          <div class="sysinfo-label">磁盘</div>
          <div class="sysinfo-value">{{ diskDisplay }}</div>
          <div class="bar-bg"><div class="bar-fill" :style="{width: (diskPct||0)+'%', background: barColor(diskPct||0)}"></div></div>
          <div class="sysinfo-sub">{{ diskTotalGb ? (diskPct||0).toFixed(1) + '%' : '' }}</div>
          <div style="font-size:11px;color:#94a3b8;margin-top:6px">点击查看各分区 ›</div>
        </div>
      </div>
      <div class="sysinfo-section-title">GPU</div>
      <div class="gpu-grid" v-if="gpus.length">
        <div v-for="gpu in gpus" :key="gpu.index" class="gpu-card" @click="showGpuDetail(gpu.index)">
          <div class="gpu-top">
            <div>
              <span class="gpu-name">GPU {{ gpu.index }}</span>
              <span class="gpu-model">{{ gpu.name }}</span>
            </div>
            <span class="gpu-pct" :style="gpuBadgeStyle(gpuMemPct(gpu))">{{ gpuMemPct(gpu) }}%</span>
          </div>
          <div class="bar-bg"><div class="bar-fill" :style="{width: gpuMemPct(gpu)+'%', background: barColor(gpuMemPct(gpu))}"></div></div>
          <div class="gpu-meta">
            <span>{{ gpu.mem_used }} / {{ gpu.mem_total }} MiB</span>
            <span>主PID: <b>{{ gpu.top_pid || '—' }}</b></span>
          </div>
          <div class="gpu-cmd" :title="gpu.top_cmd || ''">{{ gpu.top_cmd || '' }}</div>
        </div>
      </div>
      <p v-else style="color:#94a3b8;padding:16px;font-size:14px">暂无 GPU 数据</p>
      <div class="refresh-hint">每 5 秒自动刷新 · 点击卡片查看进程详情</div>
    </template>

    <!-- GPU detail -->
    <template v-else-if="gpuView === 'detail'">
      <div class="card">
        <div class="detail-header">
          <button class="back-btn" @click="gpuView='list'">← 返回</button>
          <span class="detail-title-text" id="gpuDetailTitle">
            GPU {{ currentGpuIndex }}{{ gpuDetail && gpuDetail.gpu_name ? ' — ' + gpuDetail.gpu_name : '' }}
          </span>
          <button class="back-btn" @click="loadGpuDetail(currentGpuIndex)" style="margin-left:auto">刷新</button>
        </div>
        <div v-if="gpuDetailLoading" class="gpu-stat-row">
          <span style="color:#94a3b8;font-size:13px">加载中…</span>
        </div>
        <div v-else-if="gpuDetailError" class="gpu-stat-row">
          <span style="color:#ef4444;font-size:13px">{{ gpuDetailError }}</span>
        </div>
        <template v-else-if="gpuDetail">
          <div class="gpu-stat-row">
            <div v-for="s in gpuDetailStats" :key="s.label" class="gpu-stat">
              <div class="gpu-stat-label">{{ s.label }}</div>
              <div class="gpu-stat-value">{{ s.value }}</div>
            </div>
          </div>
          <div v-if="!gpuDetail.processes || !gpuDetail.processes.length"

<script>

  warn:'告警', found:'发现', recover:'恢复', pid:'PID消失', info:'信息',
  admin_stop:'管理员停止', stop:'外部停止', crash:'异常退出'
};
const TAG_CLASSES = {
  warn:'tag-warn', found:'tag-found', recover:'tag-recover', pid:'tag-pid', info:'tag-info',
  admin_stop:'tag-admin-stop', stop:'tag-stop', crash:'tag-crash'
};

const { createApp } = Vue;

createApp({
  data() {
    return {
      // Auth
      isLoggedIn: false,
      loginPwd: '',
      loginError: false,
      // App
      tabs: [
        {id:'gpu', label:'概览'},
        {id:'pids', label:'PIDs'},
        {id:'settings', label:'设置'},
        {id:'log', label:'日志'},
        {id:'agent', label:'Agent'},
      ],
      currentTab: 'gpu',
      hostname: '',
      monitorRunning: false,
      _refreshTimer: null,
      _appStarted: false,
      // Toast
      toast: {text:'', ok:true, visible:false},
      _toastTimer: null,
      // Dropdown
      dropdownOpen: false,
      // UI appearance
      uiTheme: 'light',
      uiSurface: 'solid',
      // Password modal
      pwdModalOpen: false,
      curPwd: '', newPwd: '', confirmPwd: '',
      pwdMsg: {text:'', kind:''},
      // GPU / sysinfo
      gpus: [],
      gpuView: 'list',
      currentGpuIndex: null,
      gpuDetail: null,
      gpuDetailLoading: false,
      gpuDetailError: '',
      cpuPct: null,
      ramUsedMib: null, ramTotalMib: null,
      diskPct: null, diskUsedGb: null, diskTotalGb: null,
      diskData: [],
      // PID
      pidData: [],
      addPidInput: '',
      addNoteInput: '',
      pidMsg: {text:'', kind:''},
      // Settings
      cfgMemMonitor: true,
      cfgThreshold: 10240,
      cfgInterval: 5,
      cfgConfirm: 2,
      cfgLogMb: 10,
      cfgLogKeep: 5,
      cfgGpus: '',
      cfgServerchanKeys: '',
      barkConfigs: [],
      saveMsg: {text:'', kind:''},
      envChannelMsg: {text:'', kind:''},
      // Agent config
      cfgAgentEnabled: false,
      cfgLlmBaseUrl: '',
      cfgLlmApiKey: '',
      cfgLlmModel: '',
      cfgLlmMaxIter: 8,
      cfgLlmTimeout: 30,
      cfgLlmTemp: 0.2,
      cfgAgentStream: true,
      agentSaveMsg: {text:'', kind:''},
      // Log
      logEntries: [],
      archives: [],
      logView: 'list',
      logDetailIdx: null,
      // Agent
      agentEnabled: false,
      agentMessages: [],
      agentInput: '',
      agentBusy: false,
      agentSessionId: null,
      agentHistory: [],
      agentAbortCtrl: null,
      agentPaneHeight: 600,
      _resizeBound: false,
    };
  },

  computed: {
    ramPct() {
      return this.ramTotalMib > 0 ? Math.round(this.ramUsedMib / this.ramTotalMib * 100) : 0;
    },
    ramDisplay() {
      return this.ramTotalMib
        ? (this.ramUsedMib / 1024).toFixed(1) + ' / ' + (this.ramTotalMib / 1024).toFixed(1) + ' GB'
        : '—';
    },
    diskDisplay() {
      return this.diskTotalGb ? this.diskUsedGb + ' / ' + this.diskTotalGb + ' GB' : '—';
    },
    gpuDetailStats() {
      if (!this.gpuDetail) return [];
      const d = this.gpuDetail;
      const stats = [];
      if (d.mem_used != null && d.mem_total != null) {
        const p = d.mem_total > 0 ? Math.round(d.mem_used / d.mem_total * 100) : null;
        stats.push({label:'显存', value:`${d.mem_used} / ${d.mem_total} MiB${p != null ? ' (' + p + '%)' : ''}`});
      }
      if (d.util_pct != null) stats.push({label:'GPU 利用率', value:`${d.util_pct}%`});
      if (d.temp_c != null) stats.push({label:'温度', value:`${d.temp_c}°C`});
      stats.push({label:'进程数', value:`${(d.processes||[]).length}`});
      return stats;
    },
    gpuDetailProcessesSorted() {
      return [...(this.gpuDetail?.processes || [])].sort((a, b) => b.mem_mib - a.mem_mib);
    },
    logDetail() {
      return this.logDetailIdx !== null ? this.logEntries[this.logDetailIdx] : null;
    },
    deadPidCount() {
      return this.pidData.filter(p => !p.alive).length;
    },
  },

  watch: {
    currentTab(tab) {
      if (tab === 'agent') {
        this.$nextTick(() => {
          this.updateAgentPaneHeight();
          this.initAgentInputResize();
        });
      }
    },
  },

  methods: {
    // ── API ──────────────────────────────────────────
    async api(path, opts = {}) {
      const r = await fetch(path, opts);
      if (r.status === 401 && path !== '/api/auth/login') location.reload();
      return r;
    },

    // ── Auth ─────────────────────────────────────────
    async doLogin() {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({password: this.loginPwd}),
      });
      if (r.ok) {
        this.loginError = false;
        this.isLoggedIn = true;
        this.startApp();
      } else {
        this.loginError = true;
      }
    },

    async doLogout() {
      await fetch('/api/auth/logout', {method: 'POST'});
      location.reload();
    },

    async checkAuth() {
      try {
        const r = await fetch('/api/state');
        if (r.ok) { this.isLoggedIn = true; this.startApp(); return; }
      } catch(e) {}
    },

    // ── Bootstrap ────────────────────────────────────
    startApp() {
      if (this._appStarted) return;
      this._appStarted = true;
      this.hostname = location.hostname;
      this.startStateRefresh();
    },

    // ── Toast ─────────────────────────────────────────
    showToast(msg, ok = true) {
      this.toast = {text: msg, ok, visible: true};
      if (this._toastTimer) clearTimeout(this._toastTimer);
      this._toastTimer = setTimeout(() => { this.toast.visible = false; }, 2800);
    },

    // ── Tab ───────────────────────────────────────────
    switchTab(name) {
      this.currentTab = name;
      if (name === 'gpu' || name === 'pids') this.fetchState();
      if (name === 'pids') this.loadPids();
      if (name === 'settings') { this.loadSettings(); this.loadAgentConfig(); }
      if (name === 'log') { this.loadLog(); this.loadArchives(); }
      if (name === 'agent') {
        window.scrollTo({top:0, left:0, behavior:'auto'});
        this.loadAgentConfig();
        this.$nextTick(() => {
          this.updateAgentPaneHeight();
          this.initAgentInputResize();
        });
      }
    },

    initUiAppearance() {
      const theme = localStorage.getItem('sserveros.theme');
      const surface = localStorage.getItem('sserveros.surface');
      this.uiTheme = theme === 'dark' ? 'dark' : 'light';
      this.uiSurface = surface === 'glass' ? 'glass' : 'solid';
      this.applyUiAppearance();
    },

    applyUiAppearance() {
      document.documentElement.dataset.theme = this.uiTheme;
      document.documentElement.dataset.glass = this.uiSurface === 'glass' ? 'on' : 'off';
    },

    setUiTheme(theme) {
      this.uiTheme = theme === 'dark' ? 'dark' : 'light';
      localStorage.setItem('sserveros.theme', this.uiTheme);
      this.applyUiAppearance();
    },

    setUiSurface(surface) {
      this.uiSurface = surface === 'glass' ? 'glass' : 'solid';
      localStorage.setItem('sserveros.surface', this.uiSurface);
      this.applyUiAppearance();
    },

    updateAgentPaneHeight() {
      if (this.currentTab !== 'agent') return;
      const pane = document.getElementById('paneAgent');
      if (!pane) return;
      const top = pane.getBoundingClientRect().top;
      this.agentPaneHeight = Math.max(320, window.innerHeight - top);
    },

    // ── State ─────────────────────────────────────────
    startStateRefresh() {
      if (this._refreshTimer) return;
      this.fetchState();
      this.fetchSysinfo();
      this._refreshTimer = setInterval(() => {
        this.fetchState();
        this.fetchSysinfo();
      }, 5000);
    },

    async fetchState() {
      try {
        const r = await this.api('/api/state');
        if (!r.ok) return;
        const data = await r.json();
        this.gpus = data.gpus || [];
        if (data.hostname) this.hostname = data.hostname;
        if (this.currentTab === 'pids') this.pidData = data.watch_pids || [];
        this.monitorRunning = !!data.monitor_running;
        this.updateAgentPaneHeight();
      } catch(e) {}
    },

    async fetchSysinfo() {
      try {
        const r = await this.api('/api/sysinfo');
        if (!r.ok) return;
        const d = await r.json();
        this.cpuPct = d.cpu_pct ?? null;
        this.ramUsedMib = d.ram_used_mib ?? null;
        this.ramTotalMib = d.ram_total_mib ?? null;
        this.diskPct = d.disk_pct ?? null;
        this.diskUsedGb = d.disk_used_gb ?? null;
        this.diskTotalGb = d.disk_total_gb ?? null;
        this.diskData = d.disks || [];
      } catch(e) {}
    },

    // ── GPU ───────────────────────────────────────────
    gpuMemPct(gpu) {
      return gpu.mem_total > 0 ? Math.round(gpu.mem_used / gpu.mem_total * 100) : 0;
    },

    async showGpuDetail(idx) {
      this.currentGpuIndex = idx;
      this.gpuView = 'detail';
      this.gpuDetail = null;
      this.gpuDetailError = '';
      await Promise.all([this.loadGpuDetail(idx), this.loadPids()]);
    },

    async loadGpuDetail(idx) {
      this.gpuDetailLoading = true;
      this.gpuDetailError = '';
      try {
        const r = await this.api(`/api/gpu/${idx}/processes`);
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          this.gpuDetailError = err.error || '获取失败';
          return;
        }
        this.gpuDetail = await r.json();
      } catch(e) {
        this.gpuDetailError = '请求出错';
      } finally {
        this.gpuDetailLoading = false;
      }
    },

    showDiskDetail() {
      if (!this.diskData.length) return;
      this.gpuView = 'disk';
    },

    // ── PIDs ──────────────────────────────────────────
    async loadPids() {
      const r = await this.api('/api/state');
      if (!r.ok) return;
      const data = await r.json();
      this.pidData = data.watch_pids || [];
    },

    isPidWatched(pid) {
      return this.pidData.some(p => p.pid === pid);
    },

    async addGpuProcessPid(proc) {
      const pid = parseInt(proc?.pid, 10);
      if (!pid || pid <= 0) {
        this.showToast('PID 必须是正整数', false);
        return;
      }
      const note = `GPU ${this.currentGpuIndex}`;
      const r = await this.api('/api/pids/add', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({pid, note}),
      });
      const payload = await r.json().catch(() => ({}));
      if (r.ok) {
        this.showToast(payload.warning||payload.message||'PID 已加入监控', !payload.warning);
        await this.loadPids();
        return;
      }
      this.showToast(payload.error||'添加失败', false);
    },

    async addPid() {
      const pid = parseInt(this.addPidInput);
      if (!pid || pid <= 0) {
        this.pidMsg = {text:'PID 必须是正整数', kind:'error'};
        return;
      }
      const note = this.addNoteInput.trim();
      const r = await this.api('/api/pids/add', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({pid, note}),
      });
      const payload = await r.json().catch(() => ({}));
      if (r.ok) {
        this.addPidInput = ''; this.addNoteInput = '';
        this.pidMsg = {text: payload.warning||payload.message||'PID 已保存', kind: payload.warning?'warn':'success'};
        this.loadPids();
        return;
      }
      this.pidMsg = {text: payload.error||'添加失败', kind:'error'};
    },

    async removePid(pid) {
      const r = await this.api('/api/pids/remove', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({pid}),
      });
      const payload = await r.json().catch(() => ({}));
      this.pidMsg = {
        text: payload.warning||payload.message||(r.ok?'PID 已移除':'移除失败'),
        kind: r.ok ? (payload.warning?'warn':'success') : 'error',
      };
      this.loadPids();
    },

    async clearDeadPids() {
      const dead = this.pidData.filter(p => !p.alive);
      if (!dead.length) return;
      if (!confirm(`确认移除全部 ${dead.length} 个已消失的 PID？`)) return;
      const r = await this.api('/api/pids/clear-dead', {method:'POST'});
      const payload = await r.json().catch(() => ({}));
      if (r.ok) {
        const count = payload.removed_count ?? dead.length;
        this.pidMsg = {
          text: payload.warning||payload.message||`已移除 ${count} 个已消失的 PID`,
          kind: payload.warning?'warn':'success',
        };
        this.loadPids();
        return;
      }
      this.pidMsg = {text: payload.error||'批量移除失败', kind:'error'};
    },

    // ── Settings ──────────────────────────────────────
    async loadSettings() {
      const r = await this.api('/api/config');
      if (!r.ok) return;
      const cfg = await r.json();
      const env = cfg.env_channel_summary || {};
      this.cfgThreshold = cfg.mem_threshold_mib ?? 10240;
      this.cfgInterval = cfg.check_interval ?? 5;
      this.cfgConfirm = cfg.confirm_times ?? 2;
      this.cfgLogMb = cfg.log_max_size_mb ?? 10;
      this.cfgLogKeep = cfg.log_archive_keep ?? 5;
      this.cfgGpus = (cfg.gpus || []).join(',');
      this.cfgMemMonitor = cfg.gpu_mem_monitor_enabled !== false;
      const envScKeys = env.env_serverchan_keys || [];
      const envBarkConfigs = env.env_bark_configs || [];
      const scKeys = [...(cfg.serverchan_keys || [])];
      if (cfg.sendkey && !scKeys.includes(cfg.sendkey)) scKeys.unshift(cfg.sendkey);
      for (const k of envScKeys) { if (!scKeys.includes(k)) scKeys.push(k); }
      this.cfgServerchanKeys = scKeys.join('\n');
      const seenBark = new Set();
      const allBark = [];
      for (const b of [...(cfg.bark_configs || []), ...envBarkConfigs]) {
        const sig = `${b.url}|${b.key}`;
        if (!seenBark.has(sig)) { seenBark.add(sig); allBark.push({url: b.url||'', key: b.key||''}); }
      }
      this.barkConfigs = allBark;
      if (env.env_active) {
        const parts = [];
        if (env.env_serverchan_count) parts.push(`Server Chan ${env.env_serverchan_count} 个`);
        if (env.env_bark_count) parts.push(`Bark ${env.env_bark_count} 个`);
        this.envChannelMsg = {
          text: `已合并来自 .env 的通知渠道（${parts.join('，')}），保存后将从 .env 中清除并迁移至配置文件。`,
          kind: 'warn',
        };
      } else {
        this.envChannelMsg = {text:'', kind:''};
      }
    },

    async saveSettings() {
      const parsePos = (val, label) => {
        const v = parseInt(val, 10);
        if (!Number.isInteger(v) || v <= 0) throw new Error(label + '必须是正整数');
        return v;
      };
      const gpusStr = this.cfgGpus.trim();
      const gpus = [];
      if (gpusStr) {
        const seen = new Set();
        for (const raw of gpusStr.split(',')) {
          const token = raw.trim();
          if (!token) continue;
          if (!/^\d+$/.test(token)) { this.saveMsg={text:'GPU 索引格式错误，请输入如 0,1,2',kind:'error'}; return; }
          const v = Number(token);
          if (seen.has(v)) { this.saveMsg={text:'GPU 索引不能重复',kind:'error'}; return; }
          seen.add(v); gpus.push(v);
        }
      }
      const serverchan_keys = this.cfgServerchanKeys.split('\n').map(s=>s.trim()).filter(Boolean);
      const bark_configs = [];
      for (const b of this.barkConfigs) {
        const url = b.url.trim(), key = b.key.trim();
        if (url && key) { bark_configs.push({url, key}); }
        else if (url || key) { this.saveMsg={text:'Bark 配置不完整，URL 和设备 Key 均必填',kind:'error'}; return; }
      }
      let body;
      try {
        body = {
          mem_threshold_mib: parsePos(this.cfgThreshold, '显存告警阈值'),
          check_interval: parsePos(this.cfgInterval, '检测间隔'),
          confirm_times: parsePos(this.cfgConfirm, '确认次数'),
          log_max_size_mb: parsePos(this.cfgLogMb, '日志压缩触发大小'),
          log_archive_keep: parsePos(this.cfgLogKeep, '历史存档保留数量'),
          gpus, gpu_mem_monitor_enabled: this.cfgMemMonitor,
          sendkey: '', serverchan_keys, bark_configs,
        };
      } catch(err) {
        this.saveMsg = {text: err.message||'输入不合法', kind:'error'};
        return;
      }
      const r = await this.api('/api/settings', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body),
      });
      const payload = await r.json().catch(() => ({}));
      if (r.ok) {
        this.saveMsg = {text: payload.warning||payload.message||'已保存', kind: payload.warning?'warn':'success'};
        setTimeout(() => { this.saveMsg = {text:'', kind:''}; }, 2500);
      } else {
        this.saveMsg = {text: payload.error||'保存失败', kind:'error'};
      }
    },

    // ── Agent Config ──────────────────────────────────
    async loadAgentConfig() {
      try {
        const r = await this.api('/api/agent/config');
        if (!r.ok) return;
        const cfg = await r.json();
        this.cfgAgentEnabled = !!cfg.agent_enabled;
        this.cfgLlmBaseUrl = cfg.llm_base_url || '';
        this.cfgLlmApiKey = cfg.llm_api_key || '';
        this.cfgLlmModel = cfg.llm_model || '';
        this.cfgLlmMaxIter = cfg.llm_max_iterations ?? 8;
        this.cfgLlmTimeout = cfg.llm_request_timeout ?? 30;
        this.cfgLlmTemp = cfg.llm_temperature ?? 0.2;
        this.cfgAgentStream = cfg.agent_stream_enabled !== false;
        this.agentEnabled = !!cfg.agent_enabled;
      } catch(e) {}
    },

    async saveAgentConfig() {
      const body = {
        agent_enabled: this.cfgAgentEnabled,
        agent_stream_enabled: this.cfgAgentStream,
        llm_base_url: this.cfgLlmBaseUrl.trim(),
        llm_api_key: this.cfgLlmApiKey.trim(),
        llm_model: this.cfgLlmModel.trim(),
        llm_max_iterations: parseInt(this.cfgLlmMaxIter) || 8,
        llm_request_timeout: parseInt(this.cfgLlmTimeout) || 30,
        llm_temperature: parseFloat(this.cfgLlmTemp) || 0.2,
      };
      try {
        const r = await this.api('/api/agent/config', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body),
        });
        const d = await r.json();
        this.agentSaveMsg = {text: d.ok?'Agent 配置已保存':(d.error||'保存失败'), kind: d.ok?'success':'error'};
        setTimeout(() => { this.agentSaveMsg = {text:'',kind:''}; }, 3000);
        await this.loadAgentConfig();
      } catch(e) {
        this.agentSaveMsg = {text:'保存失败：'+e.message, kind:'error'};
      }
    },

    // ── Log ───────────────────────────────────────────
    async loadLog() {
      const r = await this.api('/api/log');
      if (!r.ok) return;
      this.logEntries = await r.json();
    },

    async loadArchives() {
      const r = await this.api('/api/log/archives');
      if (!r.ok) return;
      this.archives = await r.json();
    },

    // ── Notify ────────────────────────────────────────
    async sendTestNotify() {
      try {
        const r = await this.api('/api/notify/test', {method:'POST'});
        const payload = await r.json().catch(() => ({}));
        this.showToast(r.ok ? (payload.message||'已发送') : (payload.error||'发送失败'), r.ok);
      } catch(e) {
        this.showToast('请求出错', false);
      }
    },

    // ── Password ──────────────────────────────────────
    async changePassword() {
      if (!this.curPwd || !this.newPwd) {
        this.pwdMsg = {text:'请填写当前密码和新密码', kind:'error'}; return;
      }
      if (this.newPwd !== this.confirmPwd) {
        this.pwdMsg = {text:'两次输入的新密码不一致', kind:'error'}; return;
      }
      const r = await this.api('/api/settings', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({current_password: this.curPwd, new_password: this.newPwd}),
      });
      const payload = await r.json().catch(() => ({}));
      if (r.ok) {
        this.pwdMsg = {text: payload.message||'密码已修改', kind:'success'};
        setTimeout(() => { this.pwdModalOpen = false; this.pwdMsg = {text:'',kind:''}; }, 1200);
      } else {
        this.pwdMsg = {text: payload.error||'修改失败', kind:'error'};
      }
    },

    // ── Agent ─────────────────────────────────────────
    scrollAgentToBottom() {
      const el = this.$refs.agentMessages;
      if (el) el.scrollTop = el.scrollHeight;
    },

    async agentSend() {
      if (this.agentBusy) return;
      const msg = this.agentInput.trim();
      if (!msg) return;
      this.agentInput = '';
      if (this.$refs.agentInput) this.$refs.agentInput.style.height = '';

      if (!this.agentSessionId) {
        this.agentSessionId = 'sess_' + Math.random().toString(36).slice(2) + Date.now();
      }

      this.agentMessages.push({role:'user', content:msg});
      this.agentHistory.push({role:'user', content:msg, tool_trace:[]});

      const assistantIdx = this.agentMessages.length;
      this.agentMessages.push({
        role:'assistant', content:'', toolTrace:[], pendingActions:[],
        streaming:true, traceOpen:false, confirmResult:null,
      });
      this.agentBusy = true;
      this.agentAbortCtrl = new AbortController();
      this.$nextTick(() => this.scrollAgentToBottom());

      try {
        if (this.cfgAgentStream) {
          await this._agentSendStream(assistantIdx, msg);
        } else {
          await this._agentSendSync(assistantIdx, msg);
        }
      } catch(e) {
        const m = this.agentMessages[assistantIdx];
        if (m) {
          const errText = e.name === 'AbortError' ? '已中断' : '网络错误：' + e.message;
          this.agentMessages[assistantIdx] = {role:'error', content: errText, streaming:false};
        }
      } finally {
        this.agentBusy = false;
        this.agentAbortCtrl = null;
        const m = this.agentMessages[assistantIdx];
        if (m) m.streaming = false;
        this.$nextTick(() => {
          if (this.$refs.agentInput) this.$refs.agentInput.focus();
        });
      }
    },

    async _agentSendStream(assistantIdx, msg) {
      const resp = await this.api('/api/agent/chat/stream', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({session_id: this.agentSessionId, message: msg}),
        signal: this.agentAbortCtrl.signal,
      });
      if (!resp.ok) {
        const d = await resp.json().catch(() => ({}));
        this.agentMessages[assistantIdx] = {role:'error', content: d.error||'请求失败', streaming:false};
        return;
      }
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream:true});
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(line.slice(6)); } catch { continue; }
          const m = this.agentMessages[assistantIdx];
          if (!m) continue;
          if (event.type === 'tool_call') {
            m.toolTrace.push(event);
          } else if (event.type === 'text_delta') {
            m.content += event.delta;
            this.$nextTick(() => this.scrollAgentToBottom());
          } else if (event.type === 'done') {
            m.streaming = false;
            m.pendingActions = event.pending_actions || [];
            this.agentHistory.push({role:'assistant', content:event.reply, tool_trace:event.tool_trace||[]});
          } else if (event.type === 'error') {
            this.agentMessages[assistantIdx] = {role:'error', content: event.error||'请求失败', streaming:false};
          }
        }
      }
    },

    async _agentSendSync(assistantIdx, msg) {
      const r = await this.api('/api/agent/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({session_id: this.agentSessionId, message: msg}),
        signal: this.agentAbortCtrl.signal,
      });
      const d = await r.json();
      if (d.ok) {
        this.agentMessages[assistantIdx] = {
          role:'assistant', content: d.reply,
          toolTrace: d.tool_trace||[], pendingActions: d.pending_actions||[],
          streaming:false, traceOpen:false, confirmResult:null,
        };
        this.agentHistory.push({role:'assistant', content:d.reply, tool_trace:d.tool_trace||[]});
      } else {
        this.agentMessages[assistantIdx] = {role:'error', content: d.error||'请求失败', streaming:false};
      }
      this.$nextTick(() => this.scrollAgentToBottom());
    },

    agentInterrupt() {
      if (this.agentAbortCtrl) this.agentAbortCtrl.abort();
    },

    async agentConfirm(approved, rejected, msgIdx) {
      try {
        const r = await this.api('/api/agent/confirm', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({session_id: this.agentSessionId, approved, rejected}),
        });
        const d = await r.json();
        const m = this.agentMessages[msgIdx];
        if (m) {
          const succeeded = d.executed?.filter(e => e.ok).length || 0;
          m.pendingActions = [];
          m.confirmResult = `✓ 已执行 ${succeeded} 项操作${rejected.length ? '，' + rejected.length + ' 项已忽略' : ''}`;
        }
        if (d.executed?.some(e => e.ok)) this.fetchState();
      } catch(e) {
        this.showToast('确认失败：' + e.message, false);
      }
    },

    async agentClear() {
      if (this.agentSessionId) {
        await this.api(`/api/agent/session/${this.agentSessionId}`, {method:'DELETE'});
      }
      this.agentSessionId = null;
      this.agentHistory = [];
      this.agentMessages = [];
    },

    agentExport() {
      if (!this.agentHistory.length) { this.showToast('暂无对话内容', false); return; }
      const lines = ['# Agent 对话记录', '', `> 导出时间：${new Date().toLocaleString('zh-CN')}`, ''];
      this.agentHistory.forEach(m => {
        if (m.role === 'user') {
          lines.push(`**用户**\n\n${m.content}`, '');
        } else {
          lines.push(`**助手**\n\n${m.content}`);
          if (m.tool_trace && m.tool_trace.length) {
            lines.push('', `<details><summary>工具调用（${m.tool_trace.length} 步）</summary>`, '');
            m.tool_trace.forEach(t => {
              lines.push(`- \`${t.name}(${JSON.stringify(t.args)})\` → ${t.summary}`);
            });
            lines.push('', '</details>');
          }
          lines.push('');
        }
      });
      const blob = new Blob([lines.join('\n')], {type:'text/markdown;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `agent-chat-${new Date().toISOString().slice(0,10)}.md`;
      a.click();
      URL.revokeObjectURL(url);
    },

    agentInputKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        this.agentSend();
      }
    },

    initAgentInputResize() {
      if (this._resizeBound) return;
      const handle = this.$refs.agentResizeHandle;
      const input = this.$refs.agentInput;
      if (!handle || !input) return;
      this._resizeBound = true;
      handle.addEventListener('pointerdown', e => {
        e.preventDefault();
        handle.setPointerCapture(e.pointerId);
        const startY = e.clientY;
        const startH = input.offsetHeight;
        const onMove = ev => {
          const min = 42, max = Math.max(180, Math.floor(window.innerHeight * 0.45));
          input.style.height = Math.max(min, Math.min(max, startH + startY - ev.clientY)) + 'px';
        };
        const onUp = ev => {
          handle.releasePointerCapture(ev.pointerId);
          handle.removeEventListener('pointermove', onMove);
          handle.removeEventListener('pointerup', onUp);
          handle.removeEventListener('pointercancel', onUp);
        };
        handle.addEventListener('pointermove', onMove);
        handle.addEventListener('pointerup', onUp);
        handle.addEventListener('pointercancel', onUp);
      });
    },

    // ── Markdown ──────────────────────────────────────
    renderMd(text) {
      if (!text) return '';
      return DOMPurify.sanitize(marked.parse(text));
    },

    pendingLabel(a) {
      const note = a.note ? ' · ' + this.escHtml(a.note) : '';
      if (a.action === 'add_watch_pid')
        return `添加监控 <code>PID ${a.pid}</code>${note}`;
      return `移除监控 <code>PID ${a.pid}</code>`;
    },

    // ── Util ──────────────────────────────────────────
    barColor(pct) {
      if (pct >= 80) return 'linear-gradient(90deg,#ef4444,#f87171)';
      if (pct >= 60) return 'linear-gradient(90deg,#f59e0b,#fbbf24)';
      return 'linear-gradient(90deg,#22c55e,#4ade80)';
    },

    gpuBadgeStyle(pct) {
      if (pct >= 80) return 'background:#fee2e2;color:#ef4444';
      if (pct >= 60) return 'background:#fef3c7;color:#d97706';
      return 'background:#dbeafe;color:#2563eb';
    },

    diskTypeStyle(type) {
      if (type === 'SSD') return 'background:#dbeafe;color:#2563eb';
      if (type === 'HDD') return 'background:#fef3c7;color:#d97706';
      return 'background:#f1f5f9;color:#64748b';
    },

    tagLabel(type) { return TAG_LABELS[type] || type; },
    tagClass(type) { return TAG_CLASSES[type] || 'tag-info'; },

    fmtStartTime(s) {
      if (!s) return '—';
      const p = s.trim().split(/\s+/);
      if (p.length >= 5) return `${p[1]} ${p[2]} ${p[3].slice(0,5)}`;
      return s;
    },

    escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    },
  },

  mounted() {
    this.initUiAppearance();
    this.checkAuth();
    window.addEventListener('resize', this.updateAgentPaneHeight);
    document.addEventListener('click', e => {
      const dd = this.$refs.headerDropdown;
      if (dd && !dd.contains(e.target)) this.dropdownOpen = false;
    });
  },

  beforeUnmount() {
    window.removeEventListener('resize', this.updateAgentPaneHeight);
    if (this._refreshTimer) clearInterval(this._refreshTimer);
  },
}).mount('#app');
</script>
</body>
</html>
